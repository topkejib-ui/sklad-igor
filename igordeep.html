<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>📦 Игорь</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:15px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;background:#f2f2f7;padding-bottom:40px}
nav{position:sticky;top:0;background:#007aff;color:#fff;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.nav-brand{font-weight:700;font-size:1.1rem}
.nav-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 12px;border-radius:8px;font-size:.9rem;margin-left:5px;cursor:pointer}
.nav-btn:active{opacity:.7}
.nav-btn.active{background:#fff;color:#007aff;font-weight:700}
.screen{display:none;padding:14px}
.screen.active{display:block}
h2{font-size:1.2rem;font-weight:700;margin:0 0 8px 0}
input,select{width:100%;padding:10px 12px;border:1.5px solid #ccc;border-radius:10px;font-size:1rem;margin:6px 0;background:#fff}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;margin-top:8px}
th{background:#f0f0f5;font-size:.75rem;color:#555;padding:10px 6px;text-align:left}
td{padding:10px 6px;border-top:1px solid #eee;font-size:.9rem;vertical-align:middle}
.badge{padding:4px 8px;border-radius:6px;font-size:.75rem;font-weight:700;color:#fff;display:inline-block}
.bg-ok{background:#30d158}
.bg-warn{background:#ff9f0a}
.bg-err{background:#ff453a}
.bg-info{background:#007aff}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer}
.card:active{transform:scale(0.98)}
.btn-green{background:#30d158;color:#000;font-weight:600;padding:12px;border:none;border-radius:10px;font-size:1rem;width:100%;margin:8px 0;cursor:pointer}
.btn-blue{background:#007aff;color:#fff;font-weight:600;padding:12px;border:none;border-radius:10px;font-size:1rem;width:100%;margin:8px 0;cursor:pointer}
.btn-gray{background:#e5e5ea;color:#000;padding:12px;border:none;border-radius:10px;font-size:1rem;width:100%;margin:4px 0;cursor:pointer}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:16px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto}
.modal-h{font-weight:700;font-size:1.1rem;margin-bottom:10px;padding-bottom:8px;border-bottom:1.5px solid #eee}
.modal-f{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;padding-top:12px;border-top:1.5px solid #eee}
.qty-wrap{display:flex;align-items:center;justify-content:center;gap:8px}
.qty-btn{width:44px;height:44px;background:#fff;border:1.5px solid #d1d1d6;border-radius:10px;font-size:1.5rem;font-weight:700;color:#007aff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-btn:active{background:#007aff;color:#fff;border-color:#007aff}
.qty-inp{width:60px;height:44px;text-align:center;border:1.5px solid #d1d1d6;border-radius:10px;font-size:1.1rem;font-weight:700;margin:0;padding:0;background:#fafafa}
.qty-inp::-webkit-outer-spin-button,.qty-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
#alertMsg{display:none;padding:12px 16px;background:#30d158;color:#fff;text-align:center;font-size:.9rem;position:fixed;top:55px;left:10px;right:10px;border-radius:10px;z-index:300}
#alertMsg.err{background:#ff453a}
.wo-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;padding:14px 16px;border-top:1.5px solid #d1d1d6;z-index:50}
.hist-purchase{border-left:4px solid #30d158}
.hist-writeoff{border-left:4px solid #ff9f0a}
.hist-details{background:#f8f8fa;border-radius:8px;padding:8px;margin-top:8px}
.hist-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee;font-size:.85rem}
.hist-item:last-child{border-bottom:none}
.hist-time{color:#888;font-size:.75rem;margin-top:6px}
</style>
</head>
<body>
<nav>
    <div class="nav-brand">📦 Игорь</div>
    <div>
        <button class="nav-btn active" data-tab="stock">📋 Товары</button>
        <button class="nav-btn" data-tab="points">☕ Точки</button>
        <button class="nav-btn" data-tab="history">📜 История</button>
        <button class="nav-btn" id="btnSync">🔄</button>
    </div>
</nav>
<div id="alertMsg"></div>

<div id="tab-stock" class="screen active">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h2>Товары</h2>
        <button class="nav-btn" style="background:#30d158;color:#000" onclick="openAddItem()">➕</button>
    </div>
    <table>
        <thead><tr><th>Название</th><th style="text-align:center">Ост.</th><th style="text-align:center">Действия</th></tr></thead>
        <tbody id="sBody"></tbody>
    </table>
</div>

<div id="tab-points" class="screen">
    <h2>☕ Точки</h2>
    <p style="color:#666;font-size:.85rem;margin:4px 0 10px 0">Нажмите для списания</p>
    <div id="pList"></div>
</div>

<div id="tab-writeoff" class="screen">
    <button class="btn-gray" onclick="showTab('points')">← Назад</button>
    <h2 id="woTitle" style="margin:12px 0 8px 0">📤 Списание</h2>
    <table>
        <thead><tr><th>Товар</th><th style="text-align:center">Ост.</th><th style="text-align:center">Выбрать</th></tr></thead>
        <tbody id="woBody"></tbody>
    </table>
</div>

<div id="tab-history" class="screen">
    <h2>История</h2>
    <div id="hList"></div>
</div>

<div id="mItem" class="modal">
    <div class="modal-box">
        <div class="modal-h" id="mItemTitle">Добавить товар</div>
        <div id="mItemChoice">
            <button class="btn-green" style="margin-bottom:8px" onclick="pickItem('Вода')">💧 Вода</button>
            <button class="btn-green" onclick="pickItem('Сахар')">🍚 Сахар</button>
        </div>
        <div id="mItemForm" style="display:none">
            <input type="hidden" id="fItemId">
            <input type="hidden" id="fItemName">
            <input id="fItemDisp" readonly style="background:#f2f2f7" placeholder="Товар">
            <input type="number" id="fItemQty" placeholder="Количество *" style="margin-top:8px">
            <div class="modal-f">
                <button class="btn-gray" style="width:auto" onclick="mItemBack()">Назад</button>
                <button class="btn-blue" style="width:auto" onclick="saveItem()">💾</button>
            </div>
        </div>
        <button class="btn-gray" style="margin-top:8px" onclick="closeModal('mItem')">Закрыть</button>
    </div>
</div>

<div id="mEdit" class="modal">
    <div class="modal-box">
        <div class="modal-h">Изменить количество</div>
        <input type="hidden" id="editTargetName">
        <div style="margin-bottom:10px"><label style="color:#666;font-size:.9rem">Товар</label><input id="editName" readonly style="background:#f2f2f7"></div>
        <div style="margin-bottom:10px"><label style="color:#666;font-size:.9rem">Новое количество</label><input type="number" id="editQty"></div>
        <div class="modal-f"><button class="btn-gray" onclick="closeModal('mEdit')">Отмена</button><button class="btn-blue" onclick="saveEdit()">💾</button></div>
    </div>
</div>

<div id="woBar" class="wo-bar">
    <div style="display:flex;justify-content:space-between;align-items:center">
        <span>Выбрано: <b id="selCnt">0</b> шт.</span>
        <button class="btn-green" style="width:auto;margin:0;padding:10px 14px" onclick="confirmWO()">✅ Подтвердить</button>
    </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxw6Al9rEMUpJBsm3Zbz6DwhOOp3vEFPn_5oO0eqxAH9sokgBh4v3-zhtLTcvLaA7IlCA/exec';
const HISTORY_LIMIT = 1000;

let items = [], points = [], history = [], changed = false, curPt = null, sel = {};

const $ = id => document.getElementById(id);

const showMsg = (msg, isErr) => {
    const el = $('alertMsg');
    if(!el) return;
    el.textContent = msg;
    el.className = isErr ? 'err' : '';
    el.style.display = 'block';
    setTimeout(() => { if(el) el.style.display = 'none'; }, 2000);
};

const markChanged = () => {
    changed = true;
    const btn = $('btnSync');
    if(btn) { btn.style.background = '#ff9f0a'; btn.textContent = '⚠️'; }
};

const saveLocal = () => {
    localStorage.setItem('igor_items', JSON.stringify(items));
    localStorage.setItem('igor_points', JSON.stringify(points));
    localStorage.setItem('igor_hist', JSON.stringify(history));
};

const formatDateTime = (dateStr) => {
    if(!dateStr) return '';
    const d = new Date(dateStr);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
    const isYesterday = d.toDateString() === yesterday.toDateString();
    const time = d.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
    if(isToday) return `Сегодня в ${time}`;
    if(isYesterday) return `Вчера в ${time}`;
    return d.toLocaleString('ru-RU', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
};

window.showTab = (n) => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const tab = $('tab-'+n);
    if(tab) tab.classList.add('active');
    document.querySelectorAll('.nav-btn[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === n));
    const woBar = $('woBar');
    if(woBar) woBar.style.display = 'none';
    if(n === 'stock') renderStock();
    if(n === 'points') renderPoints();
    if(n === 'history') renderHistory();
};

document.querySelectorAll('.nav-btn[data-tab]').forEach(b => b.addEventListener('click', () => showTab(b.dataset.tab)));

window.renderStock = () => {
    const tb = $('sBody');
    if(!tb) return;
    const ig = items.filter(i => i.warehouse === 'Игорь');
    const m = {};
    ig.forEach(i => { if(!m[i.name]) m[i.name] = {name:i.name, quantity:i.quantity, order:i.order||999}; else m[i.name].quantity += i.quantity; });
    const list = Object.values(m).sort((a,b) => a.order - b.order);
    if(!list.length) { tb.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:#888">Нет товаров</td></tr>'; return; }
    tb.innerHTML = '';
    list.forEach(i => {
        const cls = i.quantity <= 0 ? 'bg-err' : (i.quantity <= 5 ? 'bg-warn' : 'bg-ok');
        const canEdit = (i.name === 'Вода' || i.name === 'Сахар');
        tb.innerHTML += `<tr><td style="font-weight:600">${i.name}</td><td style="text-align:center"><span class="badge ${cls}">${i.quantity}</span></td><td style="text-align:center">${canEdit ? `<span onclick="openEdit('${i.name}')" style="cursor:pointer">✏️</span>` : ''}</td></tr>`;
    });
};

window.openAddItem = () => {
    const ch = $('mItemChoice'), fm = $('mItemForm');
    if(ch) ch.style.display = 'block';
    if(fm) fm.style.display = 'none';
    const m = $('mItem');
    if(m) m.classList.add('open');
};

window.pickItem = (n) => {
    const nf = $('fItemName'), df = $('fItemDisp'), qf = $('fItemQty');
    if(nf) nf.value = n;
    if(df) df.value = n;
    if(qf) qf.value = '';
    const ch = $('mItemChoice'), fm = $('mItemForm');
    if(ch) ch.style.display = 'none';
    if(fm) fm.style.display = 'block';
    setTimeout(() => { const q = $('fItemQty'); if(q) q.focus(); }, 100);
};

window.mItemBack = () => {
    const ch = $('mItemChoice'), fm = $('mItemForm');
    if(ch) ch.style.display = 'block';
    if(fm) fm.style.display = 'none';
};

window.saveItem = () => {
    const n = $('fItemName')?.value;
    const q = parseInt($('fItemQty')?.value) || 0;
    if(!n) { showMsg('Выберите товар',1); return; }
    if(q <= 0) { showMsg('Кол-во > 0',1); return; }
    const ex = items.find(i => i.name === n && i.warehouse === 'Игорь');
    if(ex) ex.quantity += q;
    else items.push({id:Date.now()+Math.random(), name:n, warehouse:'Игорь', quantity:q, price:0, order:items.length});
    history.unshift({id:Date.now()+Math.random(), date:new Date().toISOString(), type:'purchase', title:`Покупка: ${n}`, items:[{name:n, qty:q}], totalQty:q, details:`Добавлено ${q} шт. "${n}"`});
    while(history.length > HISTORY_LIMIT) history.pop();
    saveLocal(); markChanged(); renderStock(); closeModal('mItem');
    const ch = $('mItemChoice'), fm = $('mItemForm');
    if(ch) ch.style.display = 'block';
    if(fm) fm.style.display = 'none';
    showMsg(`✅ Добавлено ${q} шт. "${n}"`);
};

window.openEdit = (name) => {
    if(name !== 'Вода' && name !== 'Сахар') return;
    const it = items.find(i => i.name === name && i.warehouse === 'Игорь');
    if(!it) return;
    const t = $('editTargetName'), en = $('editName'), eq = $('editQty');
    if(t) t.value = name;
    if(en) en.value = name;
    if(eq) eq.value = it.quantity;
    const m = $('mEdit');
    if(m) m.classList.add('open');
};

window.saveEdit = () => {
    const name = $('editTargetName')?.value;
    const newQty = parseInt($('editQty')?.value) || 0;
    if(!name) return;
    if(newQty < 0) { showMsg('Кол-во ≥ 0',1); return; }
    const it = items.find(i => i.name === name && i.warehouse === 'Игорь');
    if(it) {
        const oldQty = it.quantity;
        const diff = newQty - oldQty;
        it.quantity = newQty;
        if(diff !== 0) {
            history.unshift({id:Date.now()+Math.random(), date:new Date().toISOString(), type:'edit', title:`Корректировка: ${name}`, items:[{name, oldQty, newQty, diff}], totalQty:Math.abs(diff), details:`${diff>0?'Увеличен':'Уменьшен'} запас "${name}" на ${Math.abs(diff)} шт. (${oldQty} → ${newQty})`});
            while(history.length > HISTORY_LIMIT) history.pop();
        }
    }
    saveLocal(); markChanged(); renderStock(); closeModal('mEdit');
    showMsg(`✅ "${name}" обновлено: ${newQty} шт.`);
};

window.renderPoints = () => {
    const c = $('pList');
    if(!c) return;
    if(!points.length) { c.innerHTML = '<p style="text-align:center;color:#888;padding:20px">Нет точек</p>'; return; }
    c.innerHTML = '';
    points.forEach(p => {
        c.innerHTML += `<div class="card" onclick="openWO(${p.id})"><div style="display:flex;justify-content:space-between"><b>☕ ${p.name || '-'}</b></div>${p.addr ? `<div style="color:#666;font-size:.85rem;margin-top:4px">${p.addr}</div>` : ''}</div>`;
    });
};

window.openWO = (id) => {
    curPt = id;
    sel = {};
    const p = points.find(x => x.id == id);
    const t = $('woTitle');
    if(t) t.textContent = '📤 ' + (p?.name || 'Точка');
    renderWO();
    showTab('writeoff');
};

window.renderWO = () => {
    const tb = $('woBody');
    if(!tb) return;
    const ig = items.filter(i => i.warehouse === 'Игорь');
    const grp = {};
    ig.forEach(i => { if(!grp[i.name]) grp[i.name] = {id:i.id, name:i.name, quantity:i.quantity}; else grp[i.name].quantity += i.quantity; });
    const list = Object.values(grp);
    if(!list.length) { tb.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px">Нет товаров</td></tr>'; const wb = $('woBar'); if(wb) wb.style.display = 'none'; return; }
    tb.innerHTML = '';
    list.forEach(i => {
        const s = sel[i.id] || 0;
        const cls = i.quantity <= 0 ? 'bg-err' : (i.quantity <= 5 ? 'bg-warn' : 'bg-ok');
        tb.innerHTML += `<tr><td style="font-weight:600">${i.name}</td><td style="text-align:center"><span class="badge ${cls}">${i.quantity}</span></td><td style="text-align:center"><div class="qty-wrap"><button class="qty-btn" onclick="woBtn(${i.id},-1)">−</button><input type="number" class="qty-inp" data-id="${i.id}" value="${s}" onchange="woInput(this)"><button class="qty-btn" onclick="woBtn(${i.id},1)">+</button></div></td></tr>`;
    });
    updSel();
};

window.woBtn = (id, d) => {
    let c = sel[id] || 0;
    c += d;
    if(c < 0) c = 0;
    const item = items.find(i => i.id == id);
    if(item && c > item.quantity) { showMsg(`Недостаточно "${item.name}"`, 1); return; }
    sel[id] = c;
    const inp = document.querySelector(`.qty-inp[data-id="${id}"]`);
    if(inp) inp.value = c;
    updSel();
};

window.woInput = (el) => {
    const id = el.dataset.id;
    let v = parseInt(el.value) || 0;
    if(v < 0) v = 0;
    const item = items.find(i => i.id == id);
    if(item && v > item.quantity) { showMsg(`Максимум ${item.quantity} шт.`, 1); v = item.quantity; el.value = v; }
    sel[id] = v;
    updSel();
};

window.updSel = () => {
    let t = 0;
    for(let k in sel) t += sel[k];
    const sc = $('selCnt'), wb = $('woBar');
    if(sc) sc.textContent = t;
    if(wb) wb.style.display = t > 0 ? 'block' : 'none';
};

window.confirmWO = () => {
    let t = 0;
    for(let k in sel) t += sel[k];
    if(!t || !curPt) return;
    const pt = points.find(p => p.id == curPt);
    if(!pt) { showMsg('Точка не найдена',1); return; }
    if(!confirm(`Списать ${t} шт. с "${pt.name}"?`)) return;
    const op = [], det = [];
    for(let id in sel) {
        const q = sel[id];
        if(q <= 0) continue;
        const it = items.find(i => i.id == id);
        if(it && it.warehouse === 'Игорь') {
            it.quantity -= q;
            op.push({name:it.name, qty:q});
            det.push(`${it.name}: ${q} шт.`);
        }
    }
    history.unshift({id:Date.now()+Math.random(), date:new Date().toISOString(), type:'writeoff', pointId:curPt, pointName:pt.name, items:op, totalQty:t, details:`📍 ${pt.name}: ${det.join(', ')}`});
    while(history.length > HISTORY_LIMIT) history.pop();
    saveLocal(); markChanged(); showMsg(`✅ Списано ${t} шт. с "${pt.name}"`);
    const wb = $('woBar'); if(wb) wb.style.display = 'none';
    sel = {};
    renderStock();
    showTab('stock');
};

window.renderHistory = () => {
    const c = $('hList');
    if(!c) return;
    if(!history.length) { c.innerHTML = '<p style="text-align:center;color:#888;padding:40px">Пусто</p>'; return; }
    c.innerHTML = '';
    history.forEach(h => {
        const isPurchase = h.type === 'purchase';
        const isWriteoff = h.type === 'writeoff';
        const isEdit = h.type === 'edit';
        let icon = '📋', badgeCls = 'bg-info', borderCls = '';
        if(isPurchase) { icon = '📥'; badgeCls = 'bg-ok'; borderCls = 'hist-purchase'; }
        else if(isWriteoff) { icon = '📤'; badgeCls = 'bg-warn'; borderCls = 'hist-writeoff'; }
        else if(isEdit) { icon = '✏️'; badgeCls = 'bg-info'; }
        const title = h.title || (isWriteoff ? `Списание: ${h.pointName}` : 'Операция');
        let itemsHtml = '';
        if(h.items && h.items.length) {
            itemsHtml = `<div class="hist-details"><div style="font-size:.75rem;color:#666;margin-bottom:6px;">Состав:</div>`;
            h.items.forEach(it => {
                if(isEdit) itemsHtml += `<div class="hist-item"><span>${it.name}</span><span>${it.oldQty} → ${it.newQty} шт.</span></div>`;
                else itemsHtml += `<div class="hist-item"><span>${it.name}</span><span>${it.qty} шт.</span></div>`;
            });
            itemsHtml += `</div>`;
        }
        c.innerHTML += `<div class="card ${borderCls}"><div><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap"><span style="font-size:1.2rem">${icon}</span><b>${title}</b><span class="badge ${badgeCls}" style="font-size:.7rem">${h.totalQty||0} шт.</span></div><div class="hist-time">🕐 ${formatDateTime(h.date)}</div>${isWriteoff && h.pointName ? `<div style="font-size:.75rem;color:#888;margin-top:4px">📍 ${h.pointName}</div>` : ''}${itemsHtml}${h.details ? `<div style="font-size:.75rem;color:#555;margin-top:6px;padding-top:4px;border-top:1px solid #eee">📝 ${h.details}</div>` : ''}</div></div>`;
    });
};

window.closeModal = (id) => { const m = $(id); if(m) m.classList.remove('open'); };

async function sync() {
    const btn = $('btnSync');
    if(btn) { btn.textContent = '⏳'; btn.style.background = '#ff9f0a'; }
    try {
        if(changed) {
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({items,points,history})});
            if(!r.ok) throw new Error('Ошибка отправки');
            await new Promise(r=>setTimeout(r,1000));
        }
        const r = await fetch(API);
        if(!r.ok) throw new Error('Ошибка загрузки');
        const d = await r.json();
        if(d.error) throw new Error(d.error);
        if(d.items) items = d.items;
        if(d.points) points = d.points;
        if(d.history) history = d.history;
        if(history.length > HISTORY_LIMIT) history = history.slice(0, HISTORY_LIMIT);
        saveLocal();
        renderStock();
        renderPoints();
        renderHistory();
        changed = false;
        showMsg('✅ Синхронизация выполнена');
    } catch(e) { console.error(e); showMsg('Ошибка: '+e.message,1);
    } finally { if(btn) { btn.textContent = changed?'⚠️':'🔄'; btn.style.background = changed?'#ff9f0a':'rgba(255,255,255,.2)'; } }
}

const savedItems = localStorage.getItem('igor_items');
const savedPoints = localStorage.getItem('igor_points');
const savedHistory = localStorage.getItem('igor_hist');
items = savedItems ? JSON.parse(savedItems) : [];
points = savedPoints ? JSON.parse(savedPoints) : [];
history = savedHistory ? JSON.parse(savedHistory) : [];

renderStock();
renderPoints();
renderHistory();

$('btnSync')?.addEventListener('click', sync);
sync();
</script>
