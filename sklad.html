<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📦 Склад</title>
  <style>
    body{font-family:-apple-system,sans-serif;margin:0;background:#f2f2f7;padding-bottom:20px}
    .nav{position:sticky;top:0;background:#007aff;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
    .btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:8px}
    .btn:active{opacity:.7}.btn-warn{background:#ff9f0a;color:#000}
    .screen{display:none;padding:16px}.screen.active{display:block}
    input,select{width:100%;padding:12px;border:1px solid #d1d1d6;border-radius:10px;font-size:16px;margin:8px 0}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}
    th{background:#e5e5ea;font-size:13px;color:#8e8e93;padding:12px 8px;text-align:left}
    td{padding:12px 8px;border-top:1px solid #f2f2f7;font-size:15px}
    .badge{padding:4px 8px;border-radius:6px;font-size:13px;font-weight:600;color:#fff}
    .bg-ok{background:#30d158}.bg-warn{background:#ff9f0a}.bg-err{background:#ff453a}
    dialog{border:none;border-radius:16px;padding:0;width:92%;max-width:400px;background:#fff}
    dialog::backdrop{background:rgba(0,0,0,.4)}.dlg-h{padding:16px;border-bottom:1px solid #f2f2f7;font-weight:600}.dlg-b{padding:16px}
    .dlg-f{padding:16px;border-top:1px solid #f2f2f7;display:flex;justify-content:flex-end;gap:8px}
    .dlg-f .btn{background:#f2f2f7;color:#000}.dlg-f .btn.ok{background:#007aff;color:#fff}
    #log{position:fixed;bottom:0;left:0;right:0;background:#1c1c1e;color:#fff;padding:10px;font-size:11px;max-height:150px;overflow:auto;display:none}
  </style>
</head>
<body>
  <nav class="nav"><div class="nav-brand">📦 Склад</div><button class="btn" id="btnSync">🔄</button></nav>
  <div id="alert" style="padding:10px 16px;background:#30d158;color:#fff;text-align:center;display:none"></div>
  <div id="screen-stock" class="screen active">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
      <h3 style="margin:0;font-size:20px">Товары</h3>
      <button id="btnAdd" class="btn" style="background:#30d158;color:#000;margin-left:auto">➕</button>
    </div>
    <input id="search" type="search" placeholder="🔍 Поиск..." style="margin-bottom:12px">
    <table><thead><tr><th>Название</th><th>Склад</th><th style="text-align:center">Ост.</th><th>Цена</th><th></th></tr></thead><tbody id="stockBody"></tbody></table>
  </div>
  <dialog id="dlgItem"><div class="dlg-h">Товар</div><form id="formItem" class="dlg-b">
    <input type="hidden" id="fId">
    <label style="display:block;margin-bottom:6px;color:#8e8e93;font-size:14px">Название *</label><input id="fName" required>
    <label style="display:block;margin-bottom:6px;color:#8e8e93;font-size:14px">Склад *</label><select id="fWh" required><option>Игорь</option><option>Основной</option></select>
    <label style="display:block;margin-bottom:6px;color:#8e8e93;font-size:14px">Количество *</label><input type="number" id="fQty" min="0" value="1" required>
    <label style="display:block;margin-bottom:6px;color:#8e8e93;font-size:14px">Цена (₽)</label><input type="number" id="fPrice" min="0" step="0.01">
    <div class="dlg-f" style="padding:0;border:none;margin-top:16px"><button type="button" onclick="this.closest('dialog').close()" class="btn">Отмена</button><button type="submit" class="btn ok">💾</button></div>
  </form></dialog>
  <div id="log"></div>

  <script>
    // ⚠️ ВСТАВЬТЕ СЮДА ВАШ URL APPS SCRIPT
    const API = 'https://script.google.com/macros/s/AKfycbxw6Al9rEMUpJBsm3Zbz6DwhOOp3vEFPn_5oO0eqxAH9sokgBh4v3-zhtLTcvLaA7IlCA/exec';
    let items=[], changed=false;
    const $=id=>document.getElementById(id);
    const log=m=>{const l=$('log'); l.textContent='['+new Date().toLocaleTimeString()+'] '+m+'\n'+l.textContent; l.style.display='block';};
    const show=(m,t='ok')=>{const a=$('alert'); a.textContent=m; a.style.background=t==='err'?'#ff453a':'#30d158'; a.style.display='block'; setTimeout(()=>a.style.display='none',2500); log(m);};
    function mark(){changed=true; $('btnSync').className=changed?'btn btn-warn':'btn';}
    function saveLocal(){localStorage.setItem('sklad_items',JSON.stringify(items));}

    function render(){
      const q=$('search').value.toLowerCase(), tb=$('stockBody'); tb.innerHTML='';
      const list=items.filter(i=>i.name?.toLowerCase().includes(q));
      if(!list.length){tb.innerHTML='<tr><td colspan="5" style="text-align:center;padding:24px;color:#8e8e93">Нет товаров</td></tr>';return;}
      list.forEach(i=>{
        const cls=i.quantity<=0?'bg-err':i.quantity<=5?'bg-warn':'bg-ok';
        tb.innerHTML+=`<tr><td>${i.name||'-'}</td><td><small>${i.warehouse||'-'}</small></td><td style="text-align:center"><span class="badge ${cls}">${i.quantity??0}</span></td><td>${Number(i.price||0).toFixed(2)}₽</td><td><button class="del" data-id="${i.id}" style="background:none;border:none;font-size:18px">🗑️</button></td></tr>`;
      });
      tb.querySelectorAll('.del').forEach(b=>b.onclick=()=>{if(confirm('Удалить?')){items=items.filter(x=>x.id!=b.dataset.id);saveLocal();mark();render();show('Удалено');}});
    }

    $('btnAdd').onclick=()=>{$('fId').value='';$('fName').value='';$('fWh').value='Игорь';$('fQty').value='1';$('fPrice').value='';$('dlgItem').showModal();};
    $('formItem').onsubmit=e=>{e.preventDefault(); const id=$('fId').value,name=$('fName').value,wh=$('fWh').value,q=+$('fQty').value,p=+$('fPrice').value||0; if(id){const idx=items.findIndex(i=>i.id==id);if(idx>-1)items[idx]={...items[idx],name,warehouse:wh,quantity:q,price:p};}else{items.push({id:Date.now(),name,warehouse:wh,quantity:q,price:p});} saveLocal();mark();render();$('dlgItem').close();show('✅ Сохранено');};
    $('search').oninput=render;

    async function sync(){
      $('btnSync').textContent='⏳'; log('Синхронизация...');
      try{
        if(changed){
          log('Отправка...');
          const res=await fetch(API,{method:'POST',body:JSON.stringify({items,points:[],history:[]})});
          const d=await res.json(); if(d.error)throw new Error(d.error);
          log('✅ Записано'); await new Promise(r=>setTimeout(r,2000));
        }
        log('Загрузка...');
        const res=await fetch(API); const d=await res.json(); if(d.error)throw new Error(d.error);
        items=Array.isArray(d.items)?d.items:[]; saveLocal(); render(); changed=false; show('✅ Готово ('+items.length+')');
      }catch(e){log('❌ '+e.message); show('Ошибка: '+e.message,'err');}
      finally{$('btnSync').textContent=changed?'🔄 ⚠️':'🔄';}
    }
    $('btnSync').onclick=sync;
    items=JSON.parse(localStorage.getItem('sklad_items')||'[]'); render(); sync();
  </script>
</body>
</html>
