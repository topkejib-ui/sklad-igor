<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📦 Склад (PC Fix)</title>
<style>
body { font-family: sans-serif; background:#f2f2f7; margin:0; padding:20px; }
table { width:100%; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
th { background:#eee; padding:10px; text-align:left; }
td { padding:10px; border-bottom:1px solid #eee; }
tr:last-child td { border-bottom:none; }

/* КНОПКИ ПОРЯДКА - ЯВНЫЕ ДЛЯ МЫШИ */
.move-btn {
  display:inline-block; width:30px; height:30px; line-height:28px; text-align:center;
  background:#fff; border:1px solid #007aff; border-radius:4px;
  color:#007aff; cursor:pointer; font-weight:bold; user-select:none;
}
.move-btn:hover { background:#007aff; color:#fff; }
.move-btn:active { transform:scale(0.95); }
.move-btn.disabled { opacity:0.3; cursor:not-allowed; pointer-events:none; }

.nav { display:flex; justify-content:space-between; margin-bottom:15px; }
.btn { padding:8px 12px; border:none; border-radius:6px; cursor:pointer; font-size:14px; }
.btn-blue { background:#007aff; color:#fff; }
.btn-green { background:#30d158; color:#000; }
</style>
</head>
<body>

<div class="nav">
  <h2>📦 Склад</h2>
  <div>
    <button class="btn btn-blue" onclick="toggleReorder()" id="btnReorder">📋 Режим порядка</button>
    <button class="btn btn-green" onclick="openNewItem()">➕ Новый</button>
  </div>
</div>

<select id="whFilter" onchange="renderStock()" style="padding:8px; margin-bottom:10px; width:100%;">
  <option value="Игорь">📦 Игорь</option>
  <option value="Основной" selected>🏭 Основной</option>
</select>

<table id="stockTable">
  <thead><tr><th>Название</th><th>Ост.</th><th>Цена</th><th>Действия</th></tr></thead>
  <tbody id="sBody"></tbody>
</table>

<script>
// Имитация базы данных
let items = JSON.parse(localStorage.getItem('test_items')) || [
  {id:1, name:'Товар 1', warehouse:'Основной', quantity:10, price:100, order:0},
  {id:2, name:'Товар 2', warehouse:'Основной', quantity:5, price:200, order:1},
  {id:3, name:'Товар 3', warehouse:'Основной', quantity:0, price:300, order:2},
  {id:4, name:'Товар 4', warehouse:'Основной', quantity:12, price:400, order:3},
  {id:5, name:'Товар 5', warehouse:'Основной', quantity:8, price:500, order:4} // Предпоследний
];

let reorderMode = false;
const $=id=>document.getElementById(id);

function save() {
  localStorage.setItem('test_items', JSON.stringify(items));
}

function toggleReorder(){
  reorderMode = !reorderMode;
  const btn = $('btnReorder');
  btn.textContent = reorderMode ? '✅ Сохранить порядок' : '📋 Режим порядка';
  btn.style.background = reorderMode ? '#ff9f0a' : '#007aff';
  renderStock();
}

// === ГЛАВНАЯ ФУНКЦИЯ ПЕРЕМЕЩЕНИЯ ===
window.moveItemById = (itemId, direction) => {
  console.log(`Moving item ${itemId} by ${direction}`);
  
  // 1. Находим индекс товара в массиве по ID
  const idx = items.findIndex(i => i.id == itemId);
  if (idx === -1) { console.error('Item not found'); return; }

  const newIdx = idx + direction;

  // 2. Проверка границ
  if (newIdx < 0 || newIdx >= items.length) {
    console.log('Out of bounds');
    return;
  }

  // 3. Меняем местами в массиве
  [items[idx], items[newIdx]] = [items[newIdx], items[idx]];

  // 4. Обновляем order для всех
  items.forEach((it, i) => it.order = i);
  
  save();
  renderStock();
}

function renderStock(){
  const wh = $('whFilter').value;
  const tb = $('sBody');
  tb.innerHTML = '';

  // Фильтруем и сортируем
  let list = items.filter(i => i.warehouse === wh);
  list.sort((a,b) => a.order - b.order);

  if(list.length === 0) {
    tb.innerHTML = '<tr><td colspan="4" style="text-align:center">Пусто</td></tr>';
    return;
  }

  list.forEach(item => {
    // Находим текущий индекс в ОБЩЕМ массиве items для кнопок
    const currentGlobalIndex = items.findIndex(i => i.id == item.id);
    const canUp = currentGlobalIndex > 0;
    const canDown = currentGlobalIndex < items.length - 1;

    const upBtn = `<span class="move-btn ${canUp?'':'disabled'}" onclick="moveItemById(${item.id}, -1)">⬆️</span>`;
    const downBtn = `<span class="move-btn ${canDown?'':'disabled'}" onclick="moveItemById(${item.id}, 1)">⬇️</span>`;
    
    const controls = reorderMode ? `${upBtn}${downBtn}` : '';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${item.name}</td>
      <td>${item.quantity}</td>
      <td>${item.price}</td>
      <td>${controls} <span style="cursor:pointer;color:red" onclick="deleteItem(${item.id})">🗑️</span></td>
    `;
    tb.appendChild(tr);
  });
}

window.deleteItem = (id) => {
  if(confirm('Удалить?')) {
    items = items.filter(i => i.id !== id);
    save();
    renderStock();
  }
}

window.openNewItem = () => {
  const name = prompt('Название товара:');
  if(name) {
    items.push({
      id: Date.now(),
      name: name,
      warehouse: $('whFilter').value,
      quantity: 0,
      price: 0,
      order: items.length
    });
    save();
    renderStock();
  }
}

// Инициализация
renderStock();
</script>
</body>
</html>
