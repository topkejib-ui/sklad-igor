<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📦 Склад</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;margin:0;background:#f2f2f7;padding-bottom:40px}
nav{position:sticky;top:0;background:#007aff;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.nav-brand{font-weight:700;font-size:18px}
.nav-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 10px;border-radius:8px;font-size:14px;margin-left:4px}
.nav-btn:active{opacity:.7}.nav-btn.active{background:#fff;color:#007aff;font-weight:600}
.screen{display:none;padding:16px}.screen.active{display:block}
input,select{width:100%;padding:12px;border:1px solid #d1d1d6;border-radius:10px;font-size:16px;margin:6px 0}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;margin-top:8px}
th{background:#e5e5ea;font-size:13px;color:#8e8e93;padding:10px 6px;text-align:left}
td{padding:10px 6px;border-top:1px solid #f2f2f7;font-size:15px}
.badge{padding:3px 7px;border-radius:5px;font-size:12px;font-weight:600;color:#fff}
.bg-ok{background:#30d158}.bg-warn{background:#ff9f0a}.bg-err{background:#ff453a}
.card{background:#fff;padding:14px;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.btn-green{background:#30d158;color:#000;font-weight:600;padding:10px;border:none;border-radius:10px;font-size:15px;width:100%;margin:8px 0}
.btn-blue{background:#007aff;color:#fff;font-weight:600;padding:10px;border:none;border-radius:10px;font-size:15px;width:100%;margin:8px 0}
.btn-gray{background:#e5e5ea;color:#000;padding:10px;border:none;border-radius:10px;font-size:15px;width:100%;margin:4px 0}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:16px;width:92%;max-width:400px;max-height:80vh;overflow-y:auto}
.modal-h{font-weight:600;font-size:17px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f2f2f7}
.modal-f{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #f2f2f7}
.qty-btn{background:#f2f2f7;border:1px solid #d1d1d6;width:32px;height:32px;border-radius:6px;font-size:18px;display:inline-flex;align-items:center;justify-content:center}
.qty-val{width:40px;text-align:center;border:1px solid #d1d1d6;border-radius:6px;padding:4px;font-size:15px;display:inline-block}
#alert{display:none;padding:10px 16px;background:#30d158;color:#fff;text-align:center;font-size:14px;position:fixed;top:50px;left:10px;right:10px;border-radius:10px;z-index:300}
#alert.err{background:#ff453a}
.wo-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 16px;border-top:1px solid #d1d1d6;z-index:50}
.toggle-wrap{display:flex;align-items:center;gap:8px;margin:8px 0}
</style>
</head>
<body>
<nav>
  <div class="nav-brand">📦 Склад</div>
  <div>
    <button class="nav-btn active" data-tab="stock">📋</button>
    <button class="nav-btn" data-tab="points">🏪</button>
    <button class="nav-btn" data-tab="writeoff">📤</button>
    <button class="nav-btn" id="btnSync">🔄</button>
  </div>
</nav>
<div id="alert"></div>

<div id="tab-stock" class="screen active">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <h2 style="margin:0;font-size:20px">Товары</h2>
    <button class="nav-btn" style="background:#30d158;color:#000" onclick="openItemModal()">➕ Новый</button>
  </div>
  <select id="whFilter" onchange="renderStock()"><option value="">🌍 Все склады</option><option value="Игорь">📦 Игорь</option><option value="Основной">🏭 Основной</option></select>
  <input type="search" id="sSearch" placeholder="🔍 Поиск..." oninput="renderStock()">
  <table><thead><tr><th>Название</th><th>Склад</th><th style="text-align:center">Ост.</th><th>Цена</th><th></th></tr></thead><tbody id="sBody"></tbody></table>
</div>

<div id="tab-points" class="screen">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <h2 style="margin:0;font-size:20px">🏪 Точки</h2>
    <button class="nav-btn" style="background:#30d158;color:#000" onclick="openPointModal()">➕ Точка</button>
  </div>
  <div id="pList"></div>
</div>

<div id="tab-writeoff" class="screen">
  <h2 style="margin:0 0 8px 0;font-size:20px">📤 Списание на точку</h2>
  <select id="woPoint" onchange="renderWOItems()"><option value="">Выберите точку...</option></select>
  <select id="woWh"><option value="Игорь">Склад: Игорь</option><option value="Основной">Склад: Основной</option></select>
  <table><thead><tr><th>Товар</th><th style="text-align:center">Ост.</th><th style="text-align:center">Выбрать</th></tr></thead><tbody id="woBody"></tbody></table>
</div>
<div id="woBar" class="wo-bar">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span>Выбрано: <b id="selCnt">0</b> шт.</span>
    <button class="btn-green" style="width:auto;margin:0" onclick="confirmSkladWO()">✅ Подтвердить</button>
  </div>
</div>

<div id="tab-history" class="screen">
  <h2 style="margin:0 0 12px 0;font-size:20px">История</h2>
  <div id="hList"></div>
</div>

<!-- Модалка: Товар -->
<div id="mItem" class="modal">
  <div class="modal-box">
    <div class="modal-h" id="mItemTitle">Товар</div>
    <input type="hidden" id="fId"><input id="fName" placeholder="Название *" style="margin-bottom:8px">
    <select id="fWh" style="margin-bottom:8px"><option>Игорь</option><option>Основной</option></select>
    <input type="number" id="fQty" min="0" value="1" placeholder="Количество *" style="margin-bottom:8px">
    <input type="number" id="fPrice" min="0" step="0.01" placeholder="Цена (₽)" style="margin-bottom:8px">
    <div class="modal-f"><button class="btn-gray" style="width:auto" onclick="closeModal('mItem')">Отмена</button><button class="btn-blue" style="width:auto" onclick="saveItem()">💾</button></div>
  </div>
</div>

<!-- Модалка: Точка -->
<div id="mPoint" class="modal">
  <div class="modal-box">
    <div class="modal-h" id="mPtTitle">Точка</div>
    <input type="hidden" id="pId"><input id="pName" placeholder="Название *" style="margin-bottom:8px">
    <input id="pAddr" placeholder="Адрес" style="margin-bottom:8px">
    <div class="toggle-wrap"><input type="checkbox" id="pVis" checked><label for="pVis">Видна в приложении «Игорь»</label></div>
    <div class="modal-f"><button class="btn-gray" style="width:auto" onclick="closeModal('mPoint')">Отмена</button><button class="btn-blue" style="width:auto" onclick="savePoint()">💾</button></div>
  </div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbxw6Al9rEMUpJBsm3Zbz6DwhOOp3vEFPn_5oO0eqxAH9sokgBh4v3-zhtLTcvLaA7IlCA/exec';
let items=[],points=[],history=[],changed=false,woSel={};
const $=id=>document.getElementById(id);
const alert=(m,e)=>{const a=$('alert');a.textContent=m;a.className=e?'err':'';a.style.display='block';setTimeout(()=>a.style.display='none',2000);};
const mark=()=>{changed=true;$('btnSync').style.background='#ff9f0a';$('btnSync').textContent='⚠️';};
const saveLocal=()=>{localStorage.setItem('sklad_items',JSON.stringify(items));localStorage.setItem('sklad_points',JSON.stringify(points));localStorage.setItem('sklad_hist',JSON.stringify(history));};

function showTab(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('tab-'+n).classList.add('active');
  document.querySelectorAll('.nav-btn[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===n));
  $('woBar').style.display='none';
  if(n==='stock')renderStock(); if(n==='points')renderPoints(); if(n==='writeoff'){fillWOPoints();renderWOItems();} if(n==='history')renderHistory();
}
document.querySelectorAll('.nav-btn[data-tab]').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));

function renderStock(){
  const q=$('sSearch').value.toLowerCase(), wh=$('whFilter').value, tb=$('sBody'); tb.innerHTML='';
  const list=items.filter(i=>(!wh||i.warehouse===wh)&&i.name.toLowerCase().includes(q));
  if(!list.length){tb.innerHTML='<tr><td colspan="5" style="text-align:center;padding:20px;color:#8e8e93">Нет товаров</td></tr>';return;}
  list.forEach(i=>{
    const cls=i.quantity<=0?'bg-err':i.quantity<=5?'bg-warn':'bg-ok';
    tb.innerHTML+=`<tr><td>${i.name}</td><td><small>${i.warehouse}</small></td><td style="text-align:center"><span class="badge ${cls}">${i.quantity}</span></td><td>${Number(i.price||0).toFixed(2)}₽</td><td><span onclick="openItemModal(${i.id})" style="cursor:pointer;margin-right:8px">✏️</span><span onclick="delItem(${i.id})" style="cursor:pointer">🗑️</span></td></tr>`;
  });
}
function openItemModal(id){
  $('fId').value=id||'';
  if(id){const it=items.find(x=>x.id==id);$('fName').value=it.name;$('fWh').value=it.warehouse;$('fQty').value=it.quantity;$('fPrice').value=it.price||'';$('mItemTitle').textContent='Редактировать';}
  else{$('fName').value='';$('fWh').value='Игорь';$('fQty').value=1;$('fPrice').value='';$('mItemTitle').textContent='Новый товар';}
  $('mItem').classList.add('open');
}
function saveItem(){
  const id=$('fId').value,n=$('fName').value,wh=$('fWh').value,q=+$('fQty').value,p=+$('fPrice').value||0;
  if(!n||q<0)return alert('Заполните данные',1);
  if(id){const idx=items.findIndex(i=>i.id==id);if(idx>-1)items[idx]={...items[idx],name,warehouse:wh,quantity:q,price:p};}
  else{items.push({id:Date.now(),name,warehouse:wh,quantity:q,price:p});}
  saveLocal();mark();renderStock();closeModal('mItem');alert('✅ Сохранено');
}
function delItem(id){if(confirm('Удалить?')){items=items.filter(x=>x.id!=id);saveLocal();mark();renderStock();alert('Удалено');}}

function renderPoints(){
  const c=$('pList');c.innerHTML='';
  if(!points.length){c.innerHTML='<p style="text-align:center;color:#8e8e93;padding:20px">Нет точек</p>';return;}
  points.forEach(p=>{
    c.innerHTML+=`<div class="card" onclick="openPointModal(${p.id})"><div style="display:flex;justify-content:space-between;align-items:center"><b>🏪 ${p.name||'-'}</b><span onclick="event.stopPropagation();delPoint(${p.id})" style="cursor:pointer;font-size:18px">🗑️</span></div><div style="color:#8e8e93;font-size:12px;margin-top:4px">${p.addr||'Без адреса'} | ${p.visible!==false?'Видна':'Скрыта'} в Игорь</div></div>`;
  });
}
function openPointModal(id){
  $('pId').value=id||'';
  if(id){const p=points.find(x=>x.id==id);$('pName').value=p.name;$('pAddr').value=p.addr||'';$('pVis').checked=p.visible!==false;$('mPtTitle').textContent='Редактировать';}
  else{$('pName').value='';$('pAddr').value='';$('pVis').checked=true;$('mPtTitle').textContent='Новая точка';}
  $('mPoint').classList.add('open');
}
function savePoint(){
  const id=$('pId').value,n=$('pName').value.trim(),a=$('pAddr').value.trim(),v=$('pVis').checked;
  if(!n)return alert('Введите название',1);
  if(id){const p=points.find(x=>x.id==id);if(p){p.name=n;p.addr=a;p.visible=v;}}
  else{points.push({id:Date.now(),name:n,addr:a,visible:v});}
  saveLocal();mark();renderPoints();closeModal('mPoint');alert('✅ Точка сохранена');
}
function delPoint(id){if(confirm('Удалить точку?')){points=points.filter(p=>p.id!=id);saveLocal();mark();renderPoints();alert('Удалено');}}

function fillWOPoints(){
  const s=$('woPoint');s.innerHTML='<option value="">Выберите точку...</option>';
  points.filter(p=>p.visible!==false).forEach(p=>s.innerHTML+=`<option value="${p.id}">${p.name}</option>`);
}
function renderWOItems(){
  const tb=$('woBody');tb.innerHTML='';woSel={};
  const pt=$('woPoint').value, wh=$('woWh').value;
  if(!pt){$('woBar').style.display='none';return;}
  const list=items.filter(i=>i.warehouse===wh);
  if(!list.length){tb.innerHTML='<tr><td colspan="3" style="text-align:center;padding:20px">Нет товаров</td></tr';$('woBar').style.display='none';return;}
  list.forEach(i=>{
    const s=woSel[i.id]||0;
    tb.innerHTML+=`<tr><td>${i.name}</td><td style="text-align:center"><span class="badge ${i.quantity<0?'bg-err':i.quantity<=5?'bg-warn':'bg-ok'}">${i.quantity}</span></td><td style="text-align:center"><button class="qty-btn" ${s<=0?'disabled':''} onclick="setWOQty(${i.id},-1)">−</button><span class="qty-val">${s}</span><button class="qty-btn" onclick="setWOQty(${i.id},1)">+</button></td></tr>`;
  });
  updWO();
}
$('woWh').onchange=renderWOItems;
function setWOQty(id,d){let c=woSel[id]||0;c+=d;if(c<0)c=0;if(c===0)delete woSel[id];else woSel[id]=c;renderWOItems();}
function updWO(){const t=Object.values(woSel).reduce((s,q)=>s+q,0);$('selCnt').textContent=t;$('woBar').style.display=t>0?'block':'none';}
function confirmSkladWO(){
  const pt=$('woPoint').value, wh=$('woWh').value, t=Object.values(woSel).reduce((s,q)=>s+q,0);
  if(!pt||!t)return; if(!confirm(`Списать ${t} шт. на "${points.find(x=>x.id==pt).name}" со склада "${wh}"?`))return;
  const op=Object.entries(woSel).map(([id,q])=>{const it=items.find(i=>i.id==id&&i.warehouse===wh);if(it)it.quantity-=parseInt(q);return{id:it?.id,name:it?.name,qty:parseInt(q)};}).filter(x=>x.id);
  saveLocal();mark();const p=points.find(x=>x.id==pt);history.unshift({id:Date.now(),date:new Date().toISOString(),pointId:pt,pointName:p.name,items:op,totalQty:t,warehouse:wh});saveLocal();
  alert('✅ Списано '+t);$('woBar').style.display='none';woSel={};$('woPoint').value='';renderWOItems();
}

function renderHistory(){
  const c=$('hList');c.innerHTML='';
  if(!history.length){c.innerHTML='<p style="color:#8e8e93;text-align:center;padding:20px">Пусто</p>';return;}
  history.forEach(h=>{
    const itms=typeof h.items==='string'?JSON.parse(h.items):(h.items||[]);
    c.innerHTML+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><b>🏪 ${h.pointName||'-'}</b><span class="badge bg-warn">${h.totalQty||0} шт.</span></div><div style="color:#8e8e93;font-size:12px;margin-top:4px">${new Date(h.date).toLocaleString('ru-RU')} | Склад: ${h.warehouse||'-'}</div><div style="margin-top:8px;border-top:1px solid #f2f2f7;padding-top:6px">${itms.map(i=>`<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px"><span>${i.name||'-'}</span><span>${i.qty} шт.</span></div>`).join('')}</div></div>`;
  });
}

function closeModal(id){$(id).classList.remove('open');}

async function sync(){
  $('btnSync').textContent='⏳';
  try{
    if(changed){const r=await fetch(API,{method:'POST',body:JSON.stringify({items,points,history})});const d=await r.json();if(d.error)throw new Error(d.error);await new Promise(r=>setTimeout(r,2000));}
    const r=await fetch(API);const d=await r.json();if(d.error)throw new Error(d.error);
    items=Array.isArray(d.items)?d.items:[];points=Array.isArray(d.points)?d.points:[];history=Array.isArray(d.history)?d.history:[];
    saveLocal();renderStock();renderPoints();renderHistory();changed=false;alert('✅ Готово');
  }catch(e){alert('Ошибка: '+e.message,1);}
  finally{$('btnSync').textContent=changed?'⚠️':'🔄';$('btnSync').style.background=changed?'#ff9f0a':'rgba(255,255,255,.2)';}
}
$('btnSync').onclick=sync;

items=JSON.parse(localStorage.getItem('sklad_items')||'[]');points=JSON.parse(localStorage.getItem('sklad_points')||'[]');history=JSON.parse(localStorage.getItem('sklad_hist')||'[]');
renderStock();renderPoints();renderHistory();sync();
</script>
</body>
</html>
