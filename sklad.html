<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>📦 Склад</title>
<style>
html { font-size: 15px; }
body { font-family: -apple-system, sans-serif; margin:0; background:#f2f2f7; padding-bottom:40px; }
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

nav { position:sticky; top:0; background:#007aff; color:#fff; padding:10px 12px; display:flex; justify-content:space-between; align-items:center; z-index:100; }
.nav-brand { font-weight:700; font-size:1.1rem; }
.nav-btn { background:rgba(255,255,255,.2); border:none; color:#fff; padding:6px 8px; border-radius:6px; font-size:.9rem; margin-left:4px; cursor:pointer; }
.nav-btn:active { opacity:.7; }
.nav-btn.active { background:#fff; color:#007aff; font-weight:700; }

.screen { display:none; padding:12px; }
.screen.active { display:block; }
h2 { font-size:1.2rem; font-weight:700; margin:0 0 8px 0; }

input, select { width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:8px; font-size:1rem; margin:4px 0; background:#fff; }
table { width:100%; border-collapse:collapse; background:#fff; border-radius:8px; overflow:hidden; margin-top:6px; }
th { background:#f0f0f5; font-size:.75rem; color:#555; padding:8px 6px; text-align:left; }
td { padding:10px 6px; border-top:1px solid #eee; font-size:.9rem; vertical-align:middle; }

.badge { padding:3px 6px; border-radius:4px; font-size:.8rem; font-weight:700; color:#fff; }
.bg-ok { background:#30d158; } .bg-warn { background:#ff9f0a; } .bg-err { background:#ff453a; }

.btn-green { background:#30d158; color:#000; font-weight:600; padding:10px; border:none; border-radius:8px; font-size:1rem; width:100%; margin:8px 0; cursor:pointer; }
.btn-blue { background:#007aff; color:#fff; font-weight:600; padding:10px; border:none; border-radius:8px; font-size:1rem; width:100%; margin:8px 0; cursor:pointer; }
.btn-gray { background:#e5e5ea; color:#000; padding:10px; border:none; border-radius:8px; font-size:1rem; width:100%; margin:4px 0; cursor:pointer; }

/* КНОПКИ ПОРЯДКА */
.order-controls { display: flex; gap: 4px; justify-content: center; }
.move-btn {
    width: 32px; height: 32px; 
    background: #fff; border: 1px solid #007aff; border-radius: 4px;
    font-size: 16px; color: #007aff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
.move-btn:hover { background: #e6f2ff; }
.move-btn:active { background: #007aff; color: #fff; }
.move-btn.disabled { opacity: 0.3; cursor: not-allowed; border-color: #ccc; color: #ccc; pointer-events: none; }

.modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.4); z-index:200; align-items:center; justify-content:center; padding:16px; }
.modal.open { display:flex; }
.modal-box { background:#fff; border-radius:12px; padding:14px; width:100%; max-width:360px; max-height:90vh; overflow-y:auto; }
.modal-h { font-weight:700; font-size:1.1rem; margin-bottom:8px; border-bottom:1px solid #eee; padding-bottom:6px; }
.modal-f { display:flex; justify-content:flex-end; gap:6px; margin-top:10px; padding-top:10px; border-top:1px solid #eee; }

#alert { display:none; padding:10px 14px; background:#30d158; color:#fff; text-align:center; font-size:.9rem; position:fixed; top:50px; left:10px; right:10px; border-radius:8px; z-index:300; }
#alert.err { background:#ff453a; }
</style>
</head>
<body>
<nav>
  <div class="nav-brand">📦 Склад</div>
  <div>
    <button class="nav-btn active" data-tab="stock">📋</button>
    <button class="nav-btn" id="btnSync">🔄</button>
  </div>
</nav>
<div id="alert"></div>

<!-- ТОВАРЫ -->
<div id="tab-stock" class="screen active">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    <h2 style="margin:0">Товары</h2>
    <button id="btnReorder" class="btn-blue" style="width:auto;margin:0;padding:6px 10px;font-size:.85rem" onclick="toggleOrderMode()">📋 Порядок</button>
  </div>
  <select id="whFilter" onchange="renderStock()">
    <option value="Игорь">📦 Игорь</option>
    <option value="Основной" selected>🏭 Основной</option>
  </select>
  
  <table id="stockTable">
    <thead><tr><th>Название</th><th>Ост.</th><th>Цена</th><th style="width:80px">Упр.</th></tr></thead>
    <tbody id="sBody"></tbody>
  </table>
</div>

<!-- МОДАЛКА Редактирования -->
<div id="mItem" class="modal">
  <div class="modal-box">
    <div class="modal-h" id="mItemTitle">Товар</div>
    <input type="hidden" id="fId">
    <input id="fName" placeholder="Название *" style="margin-bottom:6px">
    <select id="fWh" style="margin-bottom:6px"><option>Игорь</option><option>Основной</option></select>
    <input type="number" id="fQty" placeholder="Количество *" style="margin-bottom:6px">
    <input type="number" id="fPrice" placeholder="Цена" step="0.01" style="margin-bottom:6px">
    <div class="modal-f">
        <button class="btn-gray" style="width:auto" onclick="closeModal('mItem')">Отмена</button>
        <button class="btn-blue" style="width:auto" onclick="saveItem()">💾</button>
    </div>
  </div>
</div>

<script>
// === ДАННЫЕ И НАСТРОЙКИ ===
const API='https://script.google.com/macros/s/AKfycbxw6Al9rEMUpJBsm3Zbz6DwhOOp3vEFPn_5oO0eqxAH9sokgBh4v3-zhtLTcvLaA7IlCA/exec';
let items = JSON.parse(localStorage.getItem('sklad_items')) || [];
let isOrderMode = false;
const $=id=>document.getElementById(id);

// === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
const alert=(m,e)=>{const a=$('alert');a.textContent=m;a.className=e?'err':'';a.style.display='block';setTimeout(()=>a.style.display='none',2000);};
const saveLocal=()=>{localStorage.setItem('sklad_items',JSON.stringify(items));};
const closeModal=id=>$(id).classList.remove('open');

// === ЛОГИКА ПОРЯДКА (ПЕРЕПИСАНА БЕЗ БАГОВ) ===
window.toggleOrderMode = () => {
    isOrderMode = !isOrderMode;
    const btn = $('btnReorder');
    if(isOrderMode){
        btn.style.background='#ff9f0a'; btn.style.color='#000'; btn.innerHTML='✅ Сохранить';
    } else {
        btn.style.background='#007aff'; btn.style.color='#fff'; btn.innerHTML='📋 Порядок';
    }
    renderStock();
}

// Функция перемещения, вызываемая из HTML
window.handleMove = (itemId, direction) => {
    console.log(`Move ID: ${itemId}, Dir: ${direction}`);
    
    // 1. Находим индекс в общем массиве
    const idx = items.findIndex(i => i.id == itemId);
    if (idx === -1) return;

    const newIdx = idx + direction;
    
    // 2. Проверка границ
    if (newIdx < 0 || newIdx >= items.length) return;

    // 3. Обмен местами
    const temp = items[idx];
    items[idx] = items[newIdx];
    items[newIdx] = temp;

    // 4. Обновление поля order для всех (чтобы порядок сохранился)
    items.forEach((it, i) => it.order = i);
    
    saveLocal();
    renderStock();
}

// === РЕНДЕР ТАБЛИЦЫ ===
window.renderStock = () => {
    const wh = $('whFilter').value;
    const tb = $('sBody');
    tb.innerHTML = '';

    // Фильтруем по складу
    let list = items.filter(i => i.warehouse === wh);
    
    // Сортируем по order (если есть) или по умолчанию
    list.sort((a,b) => (a.order||0) - (b.order||0));

    if(!list.length){ 
        tb.innerHTML='<tr><td colspan="4" style="text-align:center;padding:20px;color:#888">Пусто</td></tr>'; 
        return; 
    }

    list.forEach(item => {
        // Для кнопок нам нужно знать позицию в ТЕКУЩЕМ отображаемом списке,
        // но двигать мы будем по ID в общем массиве.
        
        // Определяем, можно ли двигать вверх/вниз в рамках текущего вида
        const currentIndex = list.indexOf(item);
        const canUp = currentIndex > 0;
        const canDown = currentIndex < list.length - 1;

        let controlsHtml = '';
        if(isOrderMode) {
            controlsHtml = `
                <div class="order-controls">
                    <button class="move-btn ${canUp?'':'disabled'}" onclick="handleMove(${item.id}, -1)">⬆️</button>
                    <button class="move-btn ${canDown?'':'disabled'}" onclick="handleMove(${item.id}, 1)">⬇️</button>
                </div>
            `;
        }

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${item.name}</td>
            <td style="text-align:center"><span class="badge ${item.quantity>0?'bg-ok':'bg-err'}">${item.quantity}</span></td>
            <td>${Number(item.price||0).toFixed(2)}</td>
            <td style="text-align:center">
                ${controlsHtml}
                <span onclick="openEdit(${item.id})" style="cursor:pointer;font-size:1.2rem">✏️</span>
            </td>
        `;
        tb.appendChild(tr);
    });
}

// === РЕДАКТИРОВАНИЕ И СОЗДАНИЕ ===
window.openEdit = (id) => {
    const item = items.find(i => i.id == id);
    if(!item) return;
    $('fId').value = item.id;
    $('fName').value = item.name;
    $('fWh').value = item.warehouse;
    $('fQty').value = item.quantity;
    $('fPrice').value = item.price;
    $('mItemTitle').textContent = 'Редактировать';
    $('mItem').classList.add('open');
}

window.saveItem = () => {
    const id = $('fId').value ? Number($('fId').value) : null;
    const n = $('fName').value.trim();
    const wh = $('fWh').value;
    const q = parseFloat($('fQty').value)||0;
    const p = parseFloat($('fPrice').value)||0;

    if(!n) return alert('Введите имя',1);

    if(id) {
        const idx = items.findIndex(i => i.id === id);
        if(idx !== -1) {
            items[idx].name = n; items[idx].warehouse = wh;
            items[idx].quantity = q; items[idx].price = p;
        }
    } else {
        items.push({id:Date.now(), name:n, warehouse:wh, quantity:q, price:p, order:items.length});
    }
    saveLocal();
    renderStock();
    closeModal('mItem');
    alert('✅ Сохранено');
}

// Синхронизация (заглушка для примера, замените на вашу)
$('btnSync').onclick = () => {
    alert('Синхронизация... (данные сохранены локально)');
    // Здесь ваш код fetch(API...)
}

// Запуск
renderStock();
</script>
</body>
</html>
