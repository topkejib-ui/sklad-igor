<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📦 Склад - Fix Order</title>
<style>
body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
table { width: 100%; background: #fff; border-collapse: collapse; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
th { background: #eee; }

/* Стили для кнопок порядка */
.btn-order {
    background: #007bff; color: white; border: none;
    width: 30px; height: 30px; border-radius: 4px;
    cursor: pointer; font-size: 16px; margin: 0 2px;
    display: inline-flex; align-items: center; justify-content: center;
}
.btn-order:hover { background: #0056b3; }
.btn-order:disabled { background: #ccc; cursor: not-allowed; }

.controls { display: flex; gap: 5px; }
</style>
</head>
<body>

<h2>📦 Управление товарами</h2>
<p>Нажмите "Включить порядок", чтобы появились стрелки.</p>

<button id="toggleBtn" onclick="toggleOrderMode()" style="padding:10px 20px; font-size:16px; margin-bottom:20px;">
    📋 Включить режим порядка
</button>

<table id="itemsTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Склад</th>
            <th>Действия (Порядок)</th>
        </tr>
    </thead>
    <tbody id="tableBody">
        <!-- Сюда рендерится список -->
    </tbody>
</table>

<script>
// 1. Имитация данных (замените на вашу загрузку из localStorage/API)
let items = [
    { id: 101, name: 'Молоко', warehouse: 'Основной', order: 0 },
    { id: 102, name: 'Хлеб', warehouse: 'Основной', order: 1 },
    { id: 103, name: 'Яйца', warehouse: 'Игорь', order: 2 },
    { id: 104, name: 'Сахар', warehouse: 'Игорь', order: 3 },
    { id: 105, name: 'Вода', warehouse: 'Основной', order: 4 } // Предпоследний/Последний для теста
];

let isOrderMode = false;

// 2. Функция рендера таблицы
function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    // Сортируем копию массива для отображения, но не меняем оригинал пока
    // Важно: мы отображаем товары в том порядке, в котором они сейчас в массиве items
    // (или можно сортировать по полю order, если оно есть)
    
    // Для простоты теста будем использовать текущий порядок в массиве items
    // Если у вас есть фильтрация по складу, примените её здесь:
    // const displayItems = items.filter(i => i.warehouse === 'ВыбранныйСклад');
    const displayItems = [...items]; // Используем все для теста

    displayItems.forEach((item, index) => {
        const tr = document.createElement('tr');
        
        // Ячейка с кнопками
        let actionsHtml = '';
        if (isOrderMode) {
            // Кнопки создаются с уникальными ID, но обработчик вешается ниже
            actionsHtml = `
                <div class="controls">
                    <button class="btn-order up-btn" data-id="${item.id}" ${index === 0 ? 'disabled' : ''}>⬆️</button>
                    <button class="btn-order down-btn" data-id="${item.id}" ${index === displayItems.length - 1 ? 'disabled' : ''}>⬇️</button>
                </div>
            `;
        } else {
            actionsHtml = '<span style="color:#999">Выкл</span>';
        }

        tr.innerHTML = `
            <td>${item.id}</td>
            <td>${item.name}</td>
            <td>${item.warehouse}</td>
            <td>${actionsHtml}</td>
        `;
        tbody.appendChild(tr);
    });

    // 3. НАВЕШИВАЕМ ОБРАБОТЧИКИ ПОСЛЕ РЕНДЕРА (Самый надежный способ)
    if (isOrderMode) {
        document.querySelectorAll('.up-btn').forEach(btn => {
            btn.onclick = () => moveItem(parseInt(btn.dataset.id), -1);
        });
        document.querySelectorAll('.down-btn').forEach(btn => {
            btn.onclick = () => moveItem(parseInt(btn.dataset.id), 1);
        });
    }
}

// 4. ГЛАВНАЯ ФУНКЦИЯ ПЕРЕМЕЩЕНИЯ (БЕЗ БАГОВ)
function moveItem(itemId, direction) {
    console.log(`Запрос на перемещение ID: ${itemId}, Направление: ${direction}`);

    // Находим индекс элемента в массиве
    const index = items.findIndex(i => i.id === itemId);
    
    if (index === -1) {
        console.error('Ошибка: Товар не найден!');
        return;
    }

    const newIndex = index + direction;

    // Проверка границ
    if (newIndex < 0 || newIndex >= items.length) {
        console.log('Граница достигнута, перемещение невозможно.');
        return;
    }

    // Меняем местами элементы в массиве
    // [items[index], items[newIndex]] = [items[newIndex], items[index]];
    const temp = items[index];
    items[index] = items[newIndex];
    items[newIndex] = temp;

    console.log('Перемещение успешно. Новый порядок:', items.map(i => i.name));

    // Перерисовываем таблицу
    renderTable();
    
    // Здесь можно добавить сохранение в localStorage или отправку на сервер
    // saveToServer(items);
}

// Переключение режима
function toggleOrderMode() {
    isOrderMode = !isOrderMode;
    const btn = document.getElementById('toggleBtn');
    btn.innerText = isOrderMode ? '✅ Сохранить порядок' : '📋 Включить режим порядка';
    btn.style.background = isOrderMode ? '#28a745' : '#007bff';
    btn.style.color = '#fff';
    renderTable();
}

// Запуск при загрузке
renderTable();

</script>
</body>
</html>
