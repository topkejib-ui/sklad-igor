<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>📦 Игорь</title>
<style>
html { font-size: 18px; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin:0; background:#f2f2f7; padding-bottom:50px; font-size:1rem; line-height:1.5; }
* { -webkit-tap-highlight-color: transparent; }

nav { position:sticky; top:0; background:#007aff; color:#fff; padding:16px; display:flex; justify-content:space-between; align-items:center; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.1); }
.nav-brand { font-weight:800; font-size:1.3rem; }
.nav-btn { background:rgba(255,255,255,.25); border:none; color:#fff; padding:10px 12px; border-radius:10px; font-size:1rem; margin-left:6px; font-weight:600; }
.nav-btn:active { opacity:.7; background:rgba(255,255,255,.4); }
.nav-btn.active { background:#fff; color:#007aff; font-weight:800; }

.screen { display:none; padding:20px 16px; }
.screen.active { display:block; }
h2 { font-size:1.5rem; font-weight:800; margin:0 0 12px 0; color:#111; }
p { font-size:1rem; color:#666; margin:8px 0 16px 0; }

input, select { width:100%; padding:14px 16px; border:2px solid #ccc; border-radius:12px; font-size:1.1rem; margin:8px 0; background:#fff; box-sizing:border-box; }
input:focus, select:focus { outline:none; border-color:#007aff; box-shadow:0 0 0 3px rgba(0,122,255,.2); }

table { width:100%; border-collapse:separate; border-spacing:0; background:#fff; border-radius:14px; overflow:hidden; margin-top:10px; box-shadow:0 2px 6px rgba(0,0,0,.05); }
th { background:#e5e5ea; font-size:1rem; color:#555; padding:14px 10px; text-align:left; font-weight:700; }
td { padding:14px 10px; border-top:1px solid #f2f2f7; font-size:1.1rem; vertical-align:middle; }

.badge { padding:6px 10px; border-radius:8px; font-size:1rem; font-weight:800; color:#fff; display:inline-block; }
.bg-ok { background:#30d158; } .bg-warn { background:#ff9f0a; } .bg-err { background:#ff453a; } .bg-sec { background:#8e8e93; }

.card { background:#fff; padding:18px 16px; border-radius:16px; margin-bottom:14px; box-shadow:0 2px 8px rgba(0,0,0,.06); cursor:pointer; transition:transform 0.1s; }
.card:active { background:#f0f0f5; transform:scale(0.98); }

.btn-green { background:#30d158; color:#000; font-weight:700; padding:16px; border:none; border-radius:12px; font-size:1.1rem; width:100%; margin:12px 0; }
.btn-blue { background:#007aff; color:#fff; font-weight:700; padding:16px; border:none; border-radius:12px; font-size:1.1rem; width:100%; margin:12px 0; }
.btn-gray { background:#e5e5ea; color:#000; font-weight:600; padding:16px; border:none; border-radius:12px; font-size:1.1rem; width:100%; margin:8px 0; }

.modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.45); z-index:200; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(2px); }
.modal.open { display:flex; }
.modal-box { background:#fff; border-radius:18px; padding:20px; width:100%; max-width:420px; max-height:85vh; overflow-y:auto; box-shadow:0 10px 30px rgba(0,0,0,.15); }
.modal-h { font-weight:700; font-size:1.3rem; margin-bottom:14px; padding-bottom:10px; border-bottom:2px solid #f2f2f7; }
.modal-f { display:flex; justify-content:flex-end; gap:10px; margin-top:16px; padding-top:14px; border-top:2px solid #f2f2f7; }

/* КНОПКИ +/- */
.qty-wrap { display:flex; align-items:center; justify-content:center; gap:10px; }
.qty-btn {
  width:56px; height:56px; background:#fff; border:2px solid #d1d1d6; border-radius:12px; 
  font-size:1.8rem; font-weight:700; color:#007aff; cursor:pointer; 
  display:flex; align-items:center; justify-content:center; 
  transition:all 0.1s; box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.qty-btn:active { background:#007aff; color:#fff; transform:scale(0.95); border-color:#007aff; }
.qty-btn:disabled { opacity:0.4; cursor:default; transform:none; background:#f9f9f9; border-color:#eee; color:#999; }

.qty-inp { 
  width:80px; height:56px; text-align:center; border:2px solid #d1d1d6; border-radius:12px; 
  font-size:1.4rem; font-weight:700; margin:0; padding:0; 
  -moz-appearance:textfield; background:#fafafa;
}
.qty-inp::-webkit-outer-spin-button, .qty-inp::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }

#alert { display:none; padding:16px 20px; background:#30d158; color:#fff; text-align:center; font-size:1.1rem; font-weight:600; position:fixed; top:70px; left:16px; right:16px; border-radius:12px; z-index:300; box-shadow:0 4px 15px rgba(0,0,0,.2); }
#alert.err { background:#ff453a; }
.wo-bar { display:none; position:fixed; bottom:0; left:0; right:0; background:#fff; padding:18px 20px; border-top:2px solid #d1d1d6; z-index:50; box-shadow:0 -4px 15px rgba(0,0,0,.1); }
.lock-icon { color:#bbb; font-size:1.2rem; margin:0 8px; }
</style>
</head>
<body>
<nav>
  <div class="nav-brand">📦 Игорь</div>
  <div>
    <button class="nav-btn active" data-tab="stock">📋</button>
    <button class="nav-btn" data-tab="points">☕</button>
    <button class="nav-btn" data-tab="history">📜</button>
    <button class="nav-btn" id="btnSync">🔄</button>
  </div>
</nav>
<div id="alert"></div>

<div id="tab-stock" class="screen active">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
    <h2>Товары</h2>
    <button class="nav-btn" style="background:#30d158; color:#000" onclick="openAddItem()">➕</button>
  </div>
  <table><thead><tr><th>Название</th><th style="text-align:center">Ост.</th><th style="text-align:center">Действия</th></tr></thead><tbody id="sBody"></tbody></table>
</div>

<div id="tab-points" class="screen">
  <h2>☕ Точки</h2>
  <p>Нажмите на карточку для списания</p>
  <div id="pList"></div>
</div>

<div id="tab-writeoff" class="screen">
  <button class="btn-gray" onclick="showTab('points')">← Назад к точкам</button>
  <h2 id="woTitle" style="margin:16px 0 12px 0">📤 Списание</h2>
  <table><thead><tr><th>Товар</th><th style="text-align:center">Ост.</th><th style="text-align:center">Выбрать</th></tr></thead><tbody id="woBody"></tbody></table>
</div>
<div id="woBar" class="wo-bar">
  <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px">
    <span style="font-size:1.2rem; font-weight:700">Выбрано: <b id="selCnt">0</b> шт.</span>
    <button class="btn-green" style="width:auto; margin:0; padding:14px 20px" onclick="confirmWO()">✅ Подтвердить</button>
  </div>
</div>

<div id="tab-history" class="screen">
  <h2>История</h2>
  <div id="hList"></div>
</div>

<div id="mItem" class="modal">
  <div class="modal-box">
    <div class="modal-h" id="mItemTitle">Добавить товар</div>
    <div id="mItemChoice">
      <button class="btn-green" style="margin-bottom:10px" onclick="pickItem('Вода')">💧 Вода</button>
      <button class="btn-green" onclick="pickItem('Сахар')">🍚 Сахар</button>
    </div>
    <div id="mItemForm" style="display:none">
      <input type="hidden" id="fItemId"><input type="hidden" id="fItemName">
      <input id="fItemDisp" readonly style="background:#f2f2f7" placeholder="Товар">
      <input type="tel" id="fItemQty" placeholder="Количество *" style="margin-top:10px">
      <div class="modal-f">
        <button class="btn-gray" style="width:auto" onclick="mItemBack()">Назад</button>
        <button class="btn-blue" style="width:auto" onclick="saveItem()">💾 Сохранить</button>
      </div>
    </div>
    <button class="btn-gray" style="margin-top:10px" onclick="closeModal('mItem')">Закрыть</button>
  </div>
</div>

<div id="mEdit" class="modal">
  <div class="modal-box">
    <div class="modal-h">Изменить количество</div>
    <input type="hidden" id="editTargetName">
    <div style="margin-bottom:12px"><label style="color:#666; font-size:1rem; display:block; margin-bottom:6px">Товар</label><input id="editName" readonly style="background:#f2f2f7"></div>
    <div style="margin-bottom:12px"><label style="color:#666; font-size:1rem; display:block; margin-bottom:6px">Новое количество *</label><input type="tel" id="editQty" style="margin-top:6px"></div>
    <div class="modal-f">
      <button class="btn-gray" style="width:auto" onclick="closeModal('mEdit')">Отмена</button>
      <button class="btn-blue" style="width:auto" onclick="saveEdit()">💾 Обновить</button>
    </div>
  </div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbxw6Al9rEMUpJBsm3Zbz6DwhOOp3vEFPn_5oO0eqxAH9sokgBh4v3-zhtLTcvLaA7IlCA/exec';
let items=[], points=[], history=[], changed=false, curPt=null, sel={};

const $=id=>document.getElementById(id);
const alert=(m,e)=>{const a=$('alert'); a.textContent=m; a.className=e?'err':''; a.style.display='block'; setTimeout(()=>a.style.display='none', 2500);};
const mark=()=>{changed=true; $('btnSync').style.background='#ff9f0a'; $('btnSync').textContent='⚠️';};
const saveLocal=()=>{localStorage.setItem('igor_items',JSON.stringify(items)); localStorage.setItem('igor_points',JSON.stringify(points)); localStorage.setItem('igor_hist',JSON.stringify(history));};

window.showTab=n=>{
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('tab-'+n).classList.add('active');
  document.querySelectorAll('.nav-btn[data-tab]').forEach(b=>b.classList.toggle('active', b.dataset.tab===n));
  $('woBar').style.display='none';
  if(n==='stock') renderStock(); if(n==='points') renderPoints(); if(n==='history') renderHistory();
};
document.querySelectorAll('.nav-btn[data-tab]').forEach(b=>b.addEventListener('click', ()=>window.showTab(b.dataset.tab)));

// === ТОВАРЫ ===
window.renderStock=()=>{
  const igorItems=items.filter(i=>i.warehouse==='Игорь');
  const merged={};
  igorItems.forEach(i=>{ if(!merged[i.name]) merged[i.name]={id:i.id, name:i.name, quantity:i.quantity, order:i.order}; else merged[i.name].quantity+=i.quantity; });
  const list=Object.values(merged).sort((a,b)=>(a.order||0)-(b.order||0));
  const tb=$('sBody'); tb.innerHTML='';
  if(!list.length){ tb.innerHTML='<tr><td colspan="3" style="text-align:center; padding:24px; color:#888">Нет товаров</td></tr>'; return; }
  list.forEach(i=>{
    const cls=i.quantity<=0?'bg-err':i.quantity<=5?'bg-warn':'bg-ok';
    const isEditable=(i.name==='Вода'||i.name==='Сахар');
    const actions=isEditable?`<span onclick="openEdit('${i.name}')" style="cursor:pointer; margin:0 10px; font-size:1.2rem">✏️</span><span style="color:#ccc" title="Нельзя удалить">🔒</span>`:`<span class="lock-icon">🔒</span>`;
    tb.innerHTML+=`<tr><td style="font-weight:600">${i.name}</td><td style="text-align:center"><span class="badge ${cls}">${i.quantity}</span></td><td style="text-align:center">${actions}</td></tr>`;
  });
}
window.openAddItem=()=>{$('mItemTitle').textContent='Добавить товар'; $('mItemChoice').style.display='block'; $('mItemForm').style.display='none'; $('mItem').classList.add('open');}
window.pickItem=n=>{$('fItemId').value=''; $('fItemName').value=n; $('fItemDisp').value=n; $('fItemQty').value=''; $('mItemChoice').style.display='none'; $('mItemForm').style.display='block'; setTimeout(()=>$('fItemQty').focus(), 300);}
window.mItemBack=()=>{$('mItemChoice').style.display='block'; $('mItemForm').style.display='none';}
window.saveItem=()=>{
  const n=$('fItemName').value, q=parseInt($('fItemQty').value)||0;
  if(q<0) return alert('Кол-во не может быть отрицательным',1);
  const ex=items.find(i=>i.name===n&&i.warehouse==='Игорь');
  if(ex){ ex.quantity+=q; } else { items.push({id:Date.now(), name:n, warehouse:'Игорь', quantity:q, price:0, order:items.length}); }
  saveLocal(); mark(); renderStock(); closeModal('mItem'); $('mItemChoice').style.display='block'; $('mItemForm').style.display='none'; alert('✅ Сохранено');
}
window.openEdit=name=>{
  if(name!=='Вода'&&name!=='Сахар') return;
  const it=items.find(i=>i.name===name&&i.warehouse==='Игорь'); if(!it) return;
  $('editTargetName').value=name; $('editName').value=name; $('editQty').value=it.quantity;
  $('mEdit').classList.add('open');
}
window.saveEdit=()=>{
  const name=$('editTargetName').value, q=parseInt($('editQty').value)||0;
  if(q<0) return alert('Кол-во не может быть отрицательным',1);
  items.forEach(i=>{ if(i.name===name&&i.warehouse==='Игорь') i.quantity=q; });
  saveLocal(); mark(); renderStock(); closeModal('mEdit'); alert('✅ Обновлено');
}

// === ТОЧКИ ===
window.renderPoints=()=>{
  const c=$('pList'); c.innerHTML='';
  const visible=points.filter(p=>p.owner==='igor');
  if(!visible.length){ c.innerHTML='<p style="text-align:center; color:#888; padding:24px">Нет доступных точек</p>'; return; }
  visible.forEach(p=>{ c.innerHTML+=`<div class="card" onclick="openWO(${p.id})"><div style="display:flex; justify-content:space-between; align-items:center"><b style="font-size:1.1rem">☕ ${p.name||'-'}</b></div>${p.addr?`<div style="color:#666; font-size:1rem; margin-top:6px">${p.addr}</div>`:''}</div>`; });
}

window.openWO=id=>{curPt=id; sel={}; const p=points.find(x=>x.id==id); $('woTitle').textContent='📤 '+p.name; renderWO(); window.showTab('writeoff');}
window.renderWO=()=>{
  const tb=$('woBody'); tb.innerHTML='';
  const list=items.filter(i=>i.warehouse==='Игорь');
  if(!list.length){ tb.innerHTML='<tr><td colspan="3" style="text-align:center; padding:24px">Нет товаров</td></tr>'; $('woBar').style.display='none'; return; }
  list.forEach(i=>{
    const s=sel[i.id]||0;
    const cls=i.quantity<0?'bg-err':i.quantity<=5?'bg-warn':'bg-ok';
    tb.innerHTML+=`<tr>
      <td style="font-weight:600">${i.name}</td>
      <td style="text-align:center"><span class="badge ${cls}">${i.quantity}</span></td>
      <td style="text-align:center">
        <div class="qty-wrap">
          <button type="button" class="qty-btn" onclick="woBtn(${i.id}, -1)">−</button>
          <input type="tel" class="qty-inp" data-id="${i.id}" value="${s}" inputmode="numeric" onchange="woInput(this)">
          <button type="button" class="qty-btn" onclick="woBtn(${i.id}, 1)">+</button>
        </div>
      </td>
    </tr>`;
  });
  updSel();
}

// ✅ НАДЕЖНАЯ ЛОГИКА КНОПОК И ВВОДА
window.woBtn=(id, delta)=>{
  if(!(id in sel)) sel[id]=0;
  sel[id]+=delta;
  if(sel[id]<0) sel[id]=0;
  const inp=document.querySelector(`.qty-inp[data-id="${id}"]`);
  if(inp) inp.value=sel[id];
  updSel();
}
window.woInput=el=>{
  const id=el.dataset.id;
  let val=parseInt(el.value, 10);
  if(isNaN(val) || val<0) val=0;
  sel[id]=val;
  updSel();
}
window.updSel=()=>{
  let total=0;
  for(let k in sel) total+=sel[k];
  $('selCnt').textContent=total;
  $('woBar').style.display=total>0?'block':'none';
}

window.confirmWO=()=>{
  let total=0;
  for(let k in sel) total+=sel[k];
  if(!total || !curPt) return;
  if(!confirm(`Списать ${total} шт.?`)) return;
  
  const op=[];
  for(let id in sel){
    if(sel[id]<=0) continue;
    const it=items.find(i=>i.id==id);
    if(it){
      it.quantity-=sel[id];
      op.push({id:it.id, name:it.name, qty:sel[id]});
    }
  }
  saveLocal(); mark();
  const pt=points.find(p=>p.id==curPt);
  history.unshift({id:Date.now(), date:new Date().toISOString(), pointId:curPt, pointName:pt.name, items:op, totalQty:total});
  saveLocal();
  alert('✅ Списано '+total);
  $('woBar').style.display='none'; sel={};
  window.showTab('stock');
}

window.renderHistory=()=>{
  const c=$('hList'); c.innerHTML='';
  if(!history.length){ c.innerHTML='<p style="color:#888; text-align:center; padding:24px">Пусто</p>'; return; }
  history.forEach(h=>{
    const itms=typeof h.items==='string'?JSON.parse(h.items):(h.items||[]);
    c.innerHTML+=`<div class="card"><div style="display:flex; justify-content:space-between; align-items:center"><b style="font-size:1.1rem">☕ ${h.pointName||'-'}</b><span class="badge bg-warn">${h.totalQty||0} шт.</span></div><div style="color:#666; font-size:1rem; margin-top:6px">${new Date(h.date).toLocaleString('ru-RU')}</div><div style="margin-top:10px; border-top:2px solid #f2f2f7; padding-top:8px">${itms.map(i=>`<div style="display:flex; justify-content:space-between; font-size:1.05rem; margin-bottom:6px"><span style="font-weight:500">${i.name||'-'}</span><span style="font-weight:700">${i.qty} шт.</span></div>`).join('')}</div></div>`;
  });
}
window.closeModal=id=>$(id).classList.remove('open');

async function sync(){
  $('btnSync').textContent='⏳';
  try{
    if(changed){const r=await fetch(API,{method:'POST', body:JSON.stringify({items,points,history})}); const d=await r.json(); if(d.error) throw new Error(d.error); await new Promise(r=>setTimeout(r,2000));}
    const r=await fetch(API); const d=await r.json(); if(d.error) throw new Error(d.error);
    items=Array.isArray(d.items)?d.items:[]; points=Array.isArray(d.points)?d.points:[]; history=Array.isArray(d.history)?d.history:[];
    saveLocal(); renderStock(); renderPoints(); renderHistory(); changed=false; alert('✅ Готово');
  }catch(e){alert('Ошибка: '+e.message,1);}
  finally{$('btnSync').textContent=changed?'⚠️':'🔄'; $('btnSync').style.background=changed?'#ff9f0a':'rgba(255,255,255,.25)';}
}
$('btnSync').addEventListener('click', sync);

items=JSON.parse(localStorage.getItem('igor_items')||'[]'); points=JSON.parse(localStorage.getItem('igor_points')||'[]'); history=JSON.parse(localStorage.getItem('igor_hist')||'[]');
renderStock(); renderPoints(); renderHistory(); sync();
</script>
</body>
</html>
