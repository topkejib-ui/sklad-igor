<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📦 Игорь</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;margin:0;background:#f2f2f7;padding-bottom:40px}
nav{position:sticky;top:0;background:#007aff;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.nav-brand{font-weight:700;font-size:18px}
.nav-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 10px;border-radius:8px;font-size:14px;margin-left:4px}
.nav-btn:active{opacity:.7}.nav-btn.active{background:#fff;color:#007aff;font-weight:600}
.screen{display:none;padding:16px}.screen.active{display:block}
input,select{width:100%;padding:12px;border:1px solid #d1d1d6;border-radius:10px;font-size:16px;margin:6px 0}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;margin-top:8px}
th{background:#e5e5ea;font-size:13px;color:#8e8e93;padding:10px 6px;text-align:left}
td{padding:10px 6px;border-top:1px solid #f2f2f7;font-size:15px}
.badge{padding:3px 7px;border-radius:5px;font-size:12px;font-weight:600;color:#fff}
.bg-ok{background:#30d158}.bg-warn{background:#ff9f0a}.bg-err{background:#ff453a}.bg-sec{background:#8e8e93}
.card{background:#fff;padding:14px;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);cursor:pointer}
.card:active{background:#f0f0f5}
.btn-green{background:#30d158;color:#000;font-weight:600;padding:10px;border:none;border-radius:10px;font-size:15px;width:100%;margin:8px 0}
.btn-blue{background:#007aff;color:#fff;font-weight:600;padding:10px;border:none;border-radius:10px;font-size:15px;width:100%;margin:8px 0}
.btn-gray{background:#e5e5ea;color:#000;padding:10px;border:none;border-radius:10px;font-size:15px;width:100%;margin:4px 0}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:16px;width:92%;max-width:400px;max-height:80vh;overflow-y:auto}
.modal-h{font-weight:600;font-size:17px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f2f2f7}
.modal-f{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #f2f2f7}
.qty-wrap{display:flex;align-items:center;justify-content:center;gap:8px}
.qty-btn{width:42px;height:42px;background:#e5e5ea;border:none;border-radius:10px;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}
.qty-inp{width:60px;height:42px;text-align:center;border:1px solid #d1d1d6;border-radius:10px;font-size:18px;-moz-appearance:textfield}
.qty-inp::-webkit-outer-spin-button, .qty-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
#alert{display:none;padding:10px 16px;background:#30d158;color:#fff;text-align:center;font-size:14px;position:fixed;top:50px;left:10px;right:10px;border-radius:10px;z-index:300}
#alert.err{background:#ff453a}
.wo-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 16px;border-top:1px solid #d1d1d6;z-index:50}
.reorder-btn{background:none;border:1px solid #d1d1d6;border-radius:6px;width:30px;height:30px;font-size:16px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:#007aff}
.reorder-btn:active{opacity:.6}
.lock-icon{color:#ccc;font-size:16px;margin:0 8px}
</style>
</head>
<body>
<nav>
  <div class="nav-brand">📦 Игорь</div>
  <div>
    <button class="nav-btn active" data-tab="stock">📋</button>
    <button class="nav-btn" data-tab="points">☕</button>
    <button class="nav-btn" data-tab="history">📜</button>
    <button class="nav-btn" id="btnSync">🔄</button>
  </div>
</nav>
<div id="alert"></div>

<div id="tab-stock" class="screen active">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <h2 style="margin:0;font-size:20px">Товары</h2>
    <button class="nav-btn" style="background:#30d158;color:#000" onclick="window.openAddItem()">➕</button>
  </div>
  <table><thead><tr><th>Название</th><th style="text-align:center">Ост.</th><th style="text-align:center">Действия</th></tr></thead><tbody id="sBody"></tbody></table>
</div>

<div id="tab-points" class="screen">
  <h2 style="margin:0 0 8px 0;font-size:20px">☕ Точки</h2>
  <p style="color:#8e8e93;font-size:13px;margin:4px 0">Нажмите на карточку для списания</p>
  <div id="pList"></div>
</div>

<div id="tab-writeoff" class="screen">
  <button class="btn-gray" onclick="window.showTab('points')">← Назад к точкам</button>
  <h2 id="woTitle" style="margin:12px 0 8px 0">📤 Списание</h2>
  <table><thead><tr><th>Товар</th><th style="text-align:center">Ост.</th><th style="text-align:center">Выбрать</th></tr></thead><tbody id="woBody"></tbody></table>
</div>
<div id="woBar" class="wo-bar">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span>Выбрано: <b id="selCnt">0</b> шт.</span>
    <button class="btn-green" style="width:auto;margin:0" onclick="window.confirmWO()">✅ Подтвердить</button>
  </div>
</div>

<div id="tab-history" class="screen">
  <h2 style="margin:0 0 12px 0;font-size:20px">История</h2>
  <div id="hList"></div>
</div>

<!-- Модалка: Добавить товар -->
<div id="mItem" class="modal">
  <div class="modal-box">
    <div class="modal-h" id="mItemTitle">Добавить товар</div>
    <div id="mItemChoice">
      <button class="btn-green" style="margin-bottom:8px" onclick="window.pickItem('Вода')">💧 Вода</button>
      <button class="btn-green" onclick="window.pickItem('Сахар')">🍚 Сахар</button>
    </div>
    <div id="mItemForm" style="display:none">
      <input type="hidden" id="fItemId"><input type="hidden" id="fItemName">
      <input id="fItemDisp" readonly style="background:#f2f2f7" placeholder="Товар">
      <input type="number" id="fItemQty" placeholder="Количество *" style="margin-top:8px">
      <div class="modal-f">
        <button class="btn-gray" style="width:auto" onclick="window.mItemBack()">Назад</button>
        <button class="btn-blue" style="width:auto" onclick="window.saveItem()">💾 Сохранить</button>
      </div>
    </div>
    <button class="btn-gray" style="margin-top:8px" onclick="window.closeModal('mItem')">Закрыть</button>
  </div>
</div>

<!-- Модалка: Редактировать количество (только Вода/Сахар) -->
<div id="mEdit" class="modal">
  <div class="modal-box">
    <div class="modal-h">Изменить количество</div>
    <input type="hidden" id="editTargetName">
    <div style="margin-bottom:12px"><label style="color:#8e8e93;font-size:14px">Товар</label><input id="editName" readonly style="background:#f2f2f7"></div>
    <div style="margin-bottom:12px"><label style="color:#8e8e93;font-size:14px">Новое количество *</label><input type="number" id="editQty" style="margin-top:6px"></div>
    <div class="modal-f">
      <button class="btn-gray" style="width:auto" onclick="window.closeModal('mEdit')">Отмена</button>
      <button class="btn-blue" style="width:auto" onclick="window.saveEdit()">💾 Обновить</button>
    </div>
  </div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbxw6Al9rEMUpJBsm3Zbz6DwhOOp3vEFPn_5oO0eqxAH9sokgBh4v3-zhtLTcvLaA7IlCA/exec';
let items=[],points=[],history=[],changed=false,curPt=null,sel={};
const $=id=>document.getElementById(id);
const alert=(m,e)=>{const a=$('alert');a.textContent=m;a.className=e?'err':'';a.style.display='block';setTimeout(()=>a.style.display='none',2000);};
const mark=()=>{changed=true;$('btnSync').style.background='#ff9f0a';$('btnSync').textContent='⚠️';};
const saveLocal=()=>{localStorage.setItem('igor_items',JSON.stringify(items));localStorage.setItem('igor_points',JSON.stringify(points));localStorage.setItem('igor_hist',JSON.stringify(history));};

window.showTab=n=>{
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('tab-'+n).classList.add('active');
  document.querySelectorAll('.nav-btn[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===n));
  $('woBar').style.display='none';
  if(n==='stock')window.renderStock(); if(n==='points')window.renderPoints(); if(n==='history')window.renderHistory();
}
document.querySelectorAll('.nav-btn[data-tab]').forEach(b=>b.onclick=()=>window.showTab(b.dataset.tab));

// === ТОВАРЫ ===
window.renderStock=()=>{
  // 1. Оставляем ТОЛЬКО склад Игорь
  const igorItems = items.filter(i => i.warehouse === 'Игорь');
  // 2. Убираем дубликаты: склеиваем по имени, суммируем количество
  const merged = {};
  igorItems.forEach(i => {
    if (!merged[i.name]) {
      merged[i.name] = { id: i.id, name: i.name, quantity: i.quantity };
    } else {
      merged[i.name].quantity += i.quantity;
    }
  });
  const list = Object.values(merged);
  const tb = $('sBody'); tb.innerHTML = '';
  if(!list.length){tb.innerHTML='<tr><td colspan="3" style="text-align:center;padding:20px;color:#8e8e93">Нет товаров</td></tr>';return;}
  list.forEach((i, idx) => {
    const cls=i.quantity<=0?'bg-err':i.quantity<=5?'bg-warn':'bg-ok';
    const isEditable=(i.name==='Вода'||i.name==='Сахар');
    const actions=`
      <button class="reorder-btn" onclick="window.moveItem('${i.name}',-1)" ${idx===0?'disabled':''}>↑</button>
      <button class="reorder-btn" onclick="window.moveItem('${i.name}',1)" ${idx===list.length-1?'disabled':''}>↓</button>
      ${isEditable?`<span onclick="window.openEdit('${i.name}')" style="cursor:pointer;margin:0 8px">✏️</span><span style="color:#ccc" title="Нельзя удалить">🔒</span>`:`<span class="lock-icon">🔒</span>`}
    `;
    tb.innerHTML+=`<tr><td>${i.name}</td><td style="text-align:center"><span class="badge ${cls}">${i.quantity}</span></td><td style="text-align:center">${actions}</td></tr>`;
  });
}

window.moveItem=(name, dir)=>{
  let igorIndices=[]; items.forEach((it,idx)=>{if(it.warehouse==='Игорь')igorIndices.push(idx);});
  const idxInIgor=igorIndices.findIndex(idx=>items[idx].name===name);
  if(idxInIgor<0)return;
  const swapDir=idxInIgor+dir;
  if(swapDir<0||swapDir>=igorIndices.length)return;
  const idxA=igorIndices[idxInIgor], idxB=igorIndices[swapDir];
  [items[idxA], items[idxB]] = [items[idxB], items[idxA]];
  saveLocal(); mark(); window.renderStock();
}

window.openAddItem=()=>{$('mItemTitle').textContent='Добавить товар';$('mItemChoice').style.display='block';$('mItemForm').style.display='none';$('mItem').classList.add('open');}
window.pickItem=n=>{$('fItemId').value='';$('fItemName').value=n;$('fItemDisp').value=n;$('fItemQty').value='';$('mItemChoice').style.display='none';$('mItemForm').style.display='block';}
window.mItemBack=()=>{$('mItemChoice').style.display='block';$('mItemForm').style.display='none';}
window.saveItem=()=>{
  const n=$('fItemName').value,q=parseFloat($('fItemQty').value)||0;
  if(q<0)return alert('Кол-во не может быть отрицательным',1);
  const ex=items.find(i=>i.name===n&&i.warehouse==='Игорь');
  if(ex){ex.quantity+=q;} else{items.push({id:Date.now(),name:n,warehouse:'Игорь',quantity:q,price:0});}
  saveLocal();mark();window.renderStock();window.closeModal('mItem');$('mItemChoice').style.display='block';$('mItemForm').style.display='none';alert('✅ Сохранено');
}

window.openEdit=name=>{
  if(name!=='Вода'&&name!=='Сахар')return;
  const it=items.find(i=>i.name===name&&i.warehouse==='Игорь'); if(!it)return;
  $('editTargetName').value=name; $('editName').value=name; $('editQty').value=it.quantity;
  $('mEdit').classList.add('open');
}
window.saveEdit=()=>{
  const name=$('editTargetName').value, q=parseFloat($('editQty').value)||0;
  if(q<0)return alert('Кол-во не может быть отрицательным',1);
  items.forEach(i=>{if(i.name===name&&i.warehouse==='Игорь')i.quantity=q;});
  saveLocal();mark();window.renderStock();window.closeModal('mEdit');alert('✅ Обновлено');
}

// === ТОЧКИ ===
window.renderPoints=()=>{
  const c=$('pList');c.innerHTML='';
  const vis=points.filter(p=>p.visible!==false&&p.visible!=='false');
  if(!vis.length){c.innerHTML='<p style="text-align:center;color:#8e8e93;padding:20px">Нет доступных точек</p>';return;}
  vis.forEach(p=>{c.innerHTML+=`<div class="card" onclick="window.openWO(${p.id})"><div style="display:flex;justify-content:space-between;align-items:center"><b>☕ ${p.name||'-'}</b></div>${p.addr?`<div style="color:#8e8e93;font-size:12px;margin-top:4px">${p.addr}</div>`:''}</div>`;});
}

window.openWO=id=>{curPt=id;sel={};const p=points.find(x=>x.id==id);$('woTitle').textContent='📤 '+p.name;window.renderWO();window.showTab('writeoff');}
window.renderWO=()=>{
  const tb=$('woBody');tb.innerHTML='';
  const list=items.filter(i=>i.warehouse==='Игорь');
  if(!list.length){tb.innerHTML='<tr><td colspan="3" style="text-align:center;padding:20px">Нет товаров</td></tr';$('woBar').style.display='none';return;}
  list.forEach(i=>{
    const s=sel[i.id]||0;
    const cls=i.quantity<0?'bg-err':i.quantity<=5?'bg-warn':'bg-ok';
    tb.innerHTML+=`<tr><td>${i.name}</td><td style="text-align:center"><span class="badge ${cls}">${i.quantity}</span></td><td style="text-align:center"><div class="qty-wrap"><button class="qty-btn" ${s<=0?'disabled':''} onclick="window.woBtn(${i.id},-1)">−</button><input type="number" class="qty-inp" data-id="${i.id}" value="${s}" inputmode="numeric" oninput="window.woInput(this)"><button class="qty-btn" onclick="window.woBtn(${i.id},1)">+</button></div></td></tr>`;
  });
  window.updSel();
}
window.woBtn=(id,d)=>{let c=sel[id]||0;c+=d;if(c<0)c=0;sel[id]=c;const inp=document.querySelector(`input.qty-inp[data-id="${id}"]`);if(inp)inp.value=c;window.updSel();}
window.woInput=el=>{const id=el.dataset.id;let v = el.value === '' ? 0 : parseFloat(el.value); if(isNaN(v)) v=0; if(v<0)v=0; sel[id]=v;window.updSel();}
window.updSel=()=>{const t=Object.values(sel).reduce((s,q)=>s+q,0);$('selCnt').textContent=t;$('woBar').style.display=t>0?'block':'none';}
window.confirmWO=()=>{
  const t=Object.values(sel).reduce((s,q)=>s+q,0);if(!t||!curPt)return;if(!confirm('Списать '+t+' шт.?'))return;
  const op=Object.entries(sel).map(([id,q])=>{const it=items.find(i=>i.id==id);if(it)it.quantity-=parseInt(q);return{id:it?.id,name:it?.name,qty:parseInt(q)};}).filter(x=>x.id);
  saveLocal();mark();const pt=points.find(p=>p.id==curPt);history.unshift({id:Date.now(),date:new Date().toISOString(),pointId:curPt,pointName:pt.name,items:op,totalQty:t});saveLocal();
  alert('✅ Списано '+t);$('woBar').style.display='none';sel={};window.showTab('stock');
}

window.renderHistory=()=>{
  const c=$('hList');c.innerHTML='';
  if(!history.length){c.innerHTML='<p style="color:#8e8e93;text-align:center;padding:20px">Пусто</p>';return;}
  history.forEach(h=>{
    const itms=typeof h.items==='string'?JSON.parse(h.items):(h.items||[]);
    c.innerHTML+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><b>☕ ${h.pointName||'-'}</b><span class="badge bg-warn">${h.totalQty||0} шт.</span></div><div style="color:#8e8e93;font-size:12px;margin-top:4px">${new Date(h.date).toLocaleString('ru-RU')}</div><div style="margin-top:8px;border-top:1px solid #f2f2f7;padding-top:6px">${itms.map(i=>`<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px"><span>${i.name||'-'}</span><span>${i.qty} шт.</span></div>`).join('')}</div></div>`;
  });
}
window.closeModal=id=>$(id).classList.remove('open');

async function sync(){
  $('btnSync').textContent='⏳';
  try{
    if(changed){const r=await fetch(API,{method:'POST',body:JSON.stringify({items,points,history})});const d=await r.json();if(d.error)throw new Error(d.error);await new Promise(r=>setTimeout(r,2000));}
    const r=await fetch(API);const d=await r.json();if(d.error)throw new Error(d.error);
    items=Array.isArray(d.items)?d.items:[];points=Array.isArray(d.points)?d.points:[];history=Array.isArray(d.history)?d.history:[];
    saveLocal();window.renderStock();window.renderPoints();window.renderHistory();changed=false;alert('✅ Готово');
  }catch(e){alert('Ошибка: '+e.message,1);}
  finally{$('btnSync').textContent=changed?'⚠️':'🔄';$('btnSync').style.background=changed?'#ff9f0a':'rgba(255,255,255,.2)';}
}
$('btnSync').onclick=sync;

items=JSON.parse(localStorage.getItem('igor_items')||'[]');points=JSON.parse(localStorage.getItem('igor_points')||'[]');history=JSON.parse(localStorage.getItem('igor_hist')||'[]');
window.renderStock();window.renderPoints();window.renderHistory();sync();
</script>
</body>
</html>
