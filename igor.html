<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>📦 Игорь</title>
<style>
html{font-size:15px} body{font-family:-apple-system,sans-serif;margin:0;background:#f2f2f7;padding-bottom:40px} *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} nav{position:sticky;top:0;background:#007aff;color:#fff;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;z-index:100} .nav-brand{font-weight:700;font-size:1.1rem} .nav-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 10px;border-radius:8px;font-size:.9rem;margin-left:5px} .nav-btn:active{opacity:.7} .nav-btn.active{background:#fff;color:#007aff;font-weight:700} .screen{display:none;padding:14px} .screen.active{display:block} h2{font-size:1.2rem;font-weight:700;margin:0 0 8px 0} input,select{width:100%;padding:10px 12px;border:1.5px solid #ccc;border-radius:10px;font-size:1rem;margin:6px 0;background:#fff} table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;margin-top:8px} th{background:#f0f0f5;font-size:.75rem;color:#555;padding:10px 6px;text-align:left} td{padding:10px 6px;border-top:1px solid #eee;font-size:.9rem;vertical-align:middle} .badge{padding:4px 8px;border-radius:6px;font-size:.8rem;font-weight:700;color:#fff} .bg-ok{background:#30d158} .bg-warn{background:#ff9f0a} .bg-err{background:#ff453a} .bg-info{background:#007aff} .card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:transform 0.1s} .card:active{transform:scale(0.98)} .btn-green{background:#30d158;color:#000;font-weight:600;padding:12px;border:none;border-radius:10px;font-size:1rem;width:100%;margin:8px 0} .btn-blue{background:#007aff;color:#fff;font-weight:600;padding:12px;border:none;border-radius:10px;font-size:1rem;width:100%;margin:8px 0} .btn-gray{background:#e5e5ea;color:#000;padding:12px;border:none;border-radius:10px;font-size:1rem;width:100%;margin:4px 0} .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:16px} .modal.open{display:flex} .modal-box{background:#fff;border-radius:14px;padding:16px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto} .modal-h{font-weight:700;font-size:1.1rem;margin-bottom:10px;padding-bottom:8px;border-bottom:1.5px solid #eee} .modal-f{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;padding-top:12px;border-top:1.5px solid #eee} .qty-wrap{display:flex;align-items:center;justify-content:center;gap:8px} .qty-btn{width:44px;height:44px;background:#fff;border:1.5px solid #d1d1d6;border-radius:10px;font-size:1.5rem;font-weight:700;color:#007aff;cursor:pointer;display:flex;align-items:center;justify-content:center} .qty-btn:active{background:#007aff;color:#fff;border-color:#007aff} .qty-btn:disabled{opacity:.3;cursor:default;background:#f9f9f9;border-color:#eee;color:#aaa} .qty-inp{width:60px;height:44px;text-align:center;border:1.5px solid #d1d1d6;border-radius:10px;font-size:1.1rem;font-weight:700;margin:0;padding:0;-moz-appearance:textfield;background:#fafafa} .qty-inp::-webkit-outer-spin-button,.qty-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0} #alert{display:none;padding:12px 16px;background:#30d158;color:#fff;text-align:center;font-size:.9rem;position:fixed;top:55px;left:10px;right:10px;border-radius:10px;z-index:300} #alert.err{background:#ff453a} .wo-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;padding:14px 16px;border-top:1.5px solid #d1d1d6;z-index:50} .hist-purchase{border-left:4px solid #30d158} .hist-writeoff{border-left:4px solid #ff9f0a}
</style>
</head>
<body>
<nav><div class="nav-brand">📦 Игорь</div><div><button class="nav-btn active" data-tab="stock">📋</button><button class="nav-btn" data-tab="points">☕</button><button class="nav-btn" data-tab="history">📜</button><button class="nav-btn" id="btnSync">🔄</button></div></nav>
<div id="alert"></div>
<div id="tab-stock" class="screen active"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><h2>Товары</h2><button class="nav-btn" style="background:#30d158;color:#000" onclick="openAddItem()">➕</button></div><table><thead><tr><th>Название</th><th style="text-align:center">Ост.</th><th style="text-align:center">Действия</th></tr></thead><tbody id="sBody"></tbody></table></div>
<div id="tab-points" class="screen"><h2>☕ Точки</h2><p style="color:#666;font-size:.85rem;margin:4px 0 10px 0">Нажмите для списания</p><div id="pList"></div></div>
<div id="tab-writeoff" class="screen"><button class="btn-gray" onclick="showTab('points')">← Назад</button><h2 id="woTitle" style="margin:12px 0 8px 0">📤 Списание</h2><table><thead><tr><th>Товар</th><th style="text-align:center">Ост.</th><th style="text-align:center">Выбрать</th></tr></thead><tbody id="woBody"></tbody></table></div>
<div id="woBar" class="wo-bar"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:1rem;font-weight:600">Выбрано: <b id="selCnt">0</b> шт.</span><button class="btn-green" style="width:auto;margin:0;padding:10px 14px" onclick="confirmWO()">✅ Подтвердить</button></div></div>
<div id="tab-history" class="screen"><h2>История</h2><div id="hList"></div></div>
<div id="mItem" class="modal"><div class="modal-box"><div class="modal-h" id="mItemTitle">Добавить товар</div><div id="mItemChoice"><button class="btn-green" style="margin-bottom:8px" onclick="pickItem('Вода')">💧 Вода</button><button class="btn-green" onclick="pickItem('Сахар')">🍚 Сахар</button></div><div id="mItemForm" style="display:none"><input type="hidden" id="fItemId"><input type="hidden" id="fItemName"><input id="fItemDisp" readonly style="background:#f2f2f7" placeholder="Товар"><input type="tel" id="fItemQty" placeholder="Количество *" style="margin-top:8px"><div class="modal-f"><button class="btn-gray" style="width:auto" onclick="mItemBack()">Назад</button><button class="btn-blue" style="width:auto" onclick="saveItem()">💾</button></div></div><button class="btn-gray" style="margin-top:8px" onclick="closeModal('mItem')">Закрыть</button></div></div>
<div id="mEdit" class="modal"><div class="modal-box"><div class="modal-h">Изменить количество</div><input type="hidden" id="editTargetName"><div style="margin-bottom:10px"><label style="color:#666;font-size:.9rem;display:block;margin-bottom:4px">Товар</label><input id="editName" readonly style="background:#f2f2f7"></div><div style="margin-bottom:10px"><label style="color:#666;font-size:.9rem;display:block;margin-bottom:4px">Новое количество *</label><input type="tel" id="editQty" style="margin-top:4px"></div><div class="modal-f"><button class="btn-gray" style="width:auto" onclick="closeModal('mEdit')">Отмена</button><button class="btn-blue" style="width:auto" onclick="saveEdit()">💾</button></div></div></div>

<script>
const API='https://script.google.com/macros/s/AKfycbxw6Al9rEMUpJBsm3Zbz6DwhOOp3vEFPn_5oO0eqxAH9sokgBh4v3-zhtLTcvLaA7IlCA/exec';
let items=[],points=[],history=[],changed=false,curPt=null,sel={};
if(!Array.isArray(history)) history=[];
const $=id=>document.getElementById(id); const alert=(m,e)=>{const a=$('alert');a.textContent=m;a.className=e?'err':'';a.style.display='block';setTimeout(()=>a.style.display='none',2000);};
const mark=()=>{changed=true;$('btnSync').style.background='#ff9f0a';$('btnSync').textContent='⚠️';};
const saveLocal=()=>{localStorage.setItem('igor_items',JSON.stringify(items));localStorage.setItem('igor_points',JSON.stringify(points));localStorage.setItem('igor_hist',JSON.stringify(history));};

window.showTab=n=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$('tab-'+n).classList.add('active');document.querySelectorAll('.nav-btn[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===n));$('woBar').style.display='none';if(n==='stock')renderStock();if(n==='points')renderPoints();if(n==='history')renderHistory();}
document.querySelectorAll('.nav-btn[data-tab]').forEach(b=>b.addEventListener('click',()=>window.showTab(b.dataset.tab)));

window.renderStock=()=>{const ig=items.filter(i=>i.warehouse==='Игорь'),m={};ig.forEach(i=>{if(!m[i.name])m[i.name]={id:i.id,name:i.name,quantity:i.quantity,order:i.order};else m[i.name].quantity+=i.quantity;});const list=Object.values(m).sort((a,b)=>(a.order||0)-(b.order||0)),tb=$('sBody');tb.innerHTML='';if(!list.length){tb.innerHTML='<tr><td colspan="3" style="text-align:center;padding:20px;color:#888">Нет товаров</td></tr>';return;}list.forEach(i=>{const cls=i.quantity<=0?'bg-err':i.quantity<=5?'bg-warn':'bg-ok',ed=i.name==='Вода'||i.name==='Сахар'?`<span onclick="openEdit('${i.name}')" style="cursor:pointer;margin:0 6px">✏️</span>`:'';tb.innerHTML+=`<tr><td style="font-weight:600">${i.name}</td><td style="text-align:center"><span class="badge ${cls}">${i.quantity}</span></td><td style="text-align:center">${ed}</td></tr>`;});}
window.openAddItem=()=>{$('mItemTitle').textContent='Добавить товар';$('mItemChoice').style.display='block';$('mItemForm').style.display='none';$('mItem').classList.add('open');}
window.pickItem=n=>{$('fItemId').value='';$('fItemName').value=n;$('fItemDisp').value=n;$('fItemQty').value='';$('mItemChoice').style.display='none';$('mItemForm').style.display='block';setTimeout(()=>$('fItemQty').focus(),300);}
window.mItemBack=()=>{$('mItemChoice').style.display='block';$('mItemForm').style.display='none';}
window.saveItem=()=>{
  const n=$('fItemName').value,q=parseInt($('fItemQty').value)||0;
  if(q<=0)return alert('Кол-во > 0',1);
  const ex=items.find(i=>i.name===n&&i.warehouse==='Игорь');
  if(ex)ex.quantity+=q; else items.push({id:Date.now(),name:n,warehouse:'Игорь',quantity:q,price:0,order:items.length});
  
  // Запись покупки в историю
  history.unshift({id:Date.now(),date:new Date().toISOString(),type:'purchase',title:`Покупка: ${n}`,items:[{name:n,qty:q}],totalQty:q});
  if(history.length>150)history.pop();
  
  saveLocal();mark();renderStock();closeModal('mItem');$('mItemChoice').style.display='block';$('mItemForm').style.display='none';alert('✅ Сохранено');
}
window.openEdit=name=>{if(name!=='Вода'&&name!=='Сахар')return;const it=items.find(i=>i.name===name&&i.warehouse==='Игорь');if(!it)return;$('editTargetName').value=name;$('editName').value=name;$('editQty').value=it.quantity;$('mEdit').classList.add('open');}
window.saveEdit=()=>{const name=$('editTargetName').value,q=parseInt($('editQty').value)||0;if(q<0)return alert('Кол-во ≥ 0',1);items.forEach(i=>{if(i.name===name&&i.warehouse==='Игорь')i.quantity=q;});saveLocal();mark();renderStock();closeModal('mEdit');alert('✅ Обновлено');}

window.renderPoints=()=>{const c=$('pList');c.innerHTML='';const v=points.filter(p=>p.owner==='igor');if(!v.length){c.innerHTML='<p style="text-align:center;color:#888;padding:20px">Нет доступных точек</p>';return;}v.forEach(p=>{c.innerHTML+=`<div class="card" onclick="openWO(${p.id})"><div style="display:flex;justify-content:space-between;align-items:center"><b style="font-size:1rem">☕ ${p.name||'-'}</b></div>${p.addr?`<div style="color:#666;font-size:.9rem;margin-top:4px">${p.addr}</div>`:''}</div>`;});}
window.openWO=id=>{curPt=id;sel={};const p=points.find(x=>x.id==id);$('woTitle').textContent='📤 '+p.name;renderWO();window.showTab('writeoff');}
window.renderWO=()=>{const tb=$('woBody');tb.innerHTML='';const list=items.filter(i=>i.warehouse==='Игорь');if(!list.length){tb.innerHTML='<tr><td colspan="3" style="text-align:center;padding:20px">Нет товаров</td></tr';$('woBar').style.display='none';return;}list.forEach(i=>{const s=sel[i.id]||0,cls=i.quantity<0?'bg-err':i.quantity<=5?'bg-warn':'bg-ok';tb.innerHTML+=`<tr><td style="font-weight:600">${i.name}</td><td style="text-align:center"><span class="badge ${cls}">${i.quantity}</span></td><td style="text-align:center"><div class="qty-wrap"><button type="button" class="qty-btn" onclick="woBtn(${i.id},-1)">−</button><input type="tel" class="qty-inp" data-id="${i.id}" value="${s}" inputmode="numeric" onchange="woInput(this)"><button type="button" class="qty-btn" onclick="woBtn(${i.id},1)">+</button></div></td></tr>`;});updSel();}
window.woBtn=(id,d)=>{let c=sel[id]||0;c+=d;if(c<0)c=0;sel[id]=c;const inp=document.querySelector(`.qty-inp[data-id="${id}"]`);if(inp)inp.value=c;updSel();}
window.woInput=el=>{const id=el.dataset.id;let v=parseInt(el.value)||0;if(v<0)v=0;sel[id]=v;updSel();}
window.updSel=()=>{let t=0;for(let k in sel)t+=sel[k];$('selCnt').textContent=t;$('woBar').style.display=t>0?'block':'none';}
window.confirmWO=()=>{let t=0;for(let k in sel)t+=sel[k];if(!t||!curPt)return;if(!confirm(`Списать ${t} шт.?`))return;const op=[];for(let id in sel){if(sel[id]<=0)continue;const it=items.find(i=>i.id==id);if(it){it.quantity-=sel[id];op.push({id:it.id,name:it.name,qty:sel[id]});}}const pt=points.find(p=>p.id==curPt);history.unshift({id:Date.now(),date:new Date().toISOString(),type:'writeoff',pointId:curPt,pointName:pt.name,items:op,totalQty:t});if(history.length>150)history.pop();saveLocal();mark();alert('✅ Списано');$('woBar').style.display='none';sel={};window.showTab('stock');}

// ИСТОРИЯ: РАЗВЕРНУТАЯ И БЕЗОПАСНАЯ
window.renderHistory=()=>{
  const c=$('hList');c.innerHTML='';
  if(!Array.isArray(history)||!history.length){c.innerHTML='<p style="color:#888;text-align:center;padding:20px">Пусто</p>';return;}
  history.forEach(h=>{
    const itms = Array.isArray(h.items) ? h.items : [];
    const isPurchase = h.type === 'purchase';
    const icon = isPurchase ? '📥' : '☕';
    const cls = isPurchase ? 'bg-ok' : 'bg-warn';
    const borderCls = isPurchase ? 'hist-purchase' : 'hist-writeoff';
    const title = h.title || (h.pointName ? `Списание на ${h.pointName}` : 'Операция');
    const dateStr = h.date ? new Date(h.date).toLocaleString('ru-RU', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
    
    const itemsList = itms.length > 0 ? `
      <div style="margin-top:8px;border-top:1.5px solid #eee;padding-top:6px">
        ${itms.map(i=>`<div style="display:flex;justify-content:space-between;font-size:.95rem;margin-bottom:4px">
          <span style="font-weight:500">${i.name||'-'}</span><span style="font-weight:700">${i.qty} шт.</span>
        </div>`).join('')}
      </div>` : '';

    c.innerHTML+=`<div class="card ${borderCls}"><div style="display:flex;justify-content:space-between;align-items:center"><b style="font-size:1rem">${icon} ${title}</b><span class="badge ${cls}">${h.totalQty||0} шт.</span></div><div style="color:#666;font-size:.9rem;margin-top:4px">${dateStr}</div>${itemsList}</div>`;
  });
}
window.closeModal=id=>$(id).classList.remove('open');

async function sync(){const btn=$('btnSync');btn.textContent='⏳';btn.style.background='#ff9f0a';try{if(changed){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({items,points,history})});if(!r.ok)throw new Error('Ошибка отправки');await new Promise(r=>setTimeout(r,1500));}const r=await fetch(API);if(!r.ok)throw new Error('Ошибка загрузки');const txt=await r.text();const d=JSON.parse(txt);if(d.error)throw new Error(d.error);items=Array.isArray(d.items)?d.items:[];points=Array.isArray(d.points)?d.points:[];history=Array.isArray(d.history)?d.history:[];saveLocal();renderStock();renderPoints();renderHistory();changed=false;alert('✅ Готово');}catch(e){console.error(e);alert('Ошибка: '+e.message,1);}finally{btn.textContent=changed?'⚠️':'🔄';btn.style.background=changed?'#ff9f0a':'rgba(255,255,255,.2)';}}
$('btnSync').addEventListener('click',sync);

items=JSON.parse(localStorage.getItem('igor_items')||'[]');points=JSON.parse(localStorage.getItem('igor_points')||'[]');history=JSON.parse(localStorage.getItem('igor_hist')||'[]');
renderStock();renderPoints();renderHistory();sync();
</script>
</body>
</html>
